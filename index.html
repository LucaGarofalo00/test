<style>
/* === DESIGN SYSTEM TOKENS === */
:root{
  /* Accent (themable) */
  --acc:#C8FF00;
  --acc2:rgba(200,255,0,0.13);
  --acc3:rgba(200,255,0,0.20);
  --acc5:rgba(200,255,0,0.09);
  --act:#000;
  /* Neutrals */
  --bg:#0C0C0D;
  --surf-1:#161618;
  --surf-2:#202022;
  --surf-3:#2A2A2D;
  --bord-1:rgba(255,255,255,0.06);
  --bord-2:rgba(255,255,255,0.10);
  --text:#F0EFE8;
  --muted:rgba(240,239,232,0.55);
  --muted-2:rgba(240,239,232,0.32);
  /* Semantic */
  --danger:#EF4444;
  --danger-bg:rgba(239,68,68,0.10);
  --danger-bord:rgba(239,68,68,0.30);
  --success:#C8FF00;
  --warning:#F59E0B;
  /* Spacing */
  --sp-1:4px; --sp-2:8px; --sp-3:12px; --sp-4:16px; --sp-5:24px; --sp-6:32px; --sp-7:48px;
  /* Radius */
  --r-sm:6px; --r-md:10px; --r-lg:14px; --r-xl:20px; --r-full:999px;
  /* Type */
  --f-display:'Bebas Neue',cursive;
  --f-cond:'Barlow Condensed',sans-serif;
  --f-body:'Barlow',sans-serif;
  --f-mono:'Roboto Mono',monospace;
}

/* === RESET === */
*{box-sizing:border-box;margin:0;padding:0}
html,body{overscroll-behavior-y:none;-webkit-tap-highlight-color:transparent}
body{
  background:var(--bg);color:var(--text);font-family:var(--f-body);
  min-height:100vh;min-height:100dvh;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
  font-variant-numeric:tabular-nums;
}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}
/* date input: rimuove lo styling nativo iOS Safari che faceva uscire l'input dal contenitore */
input[type=date]{-webkit-appearance:none;appearance:none;max-width:100%;min-height:46px}
input[type=date]::-webkit-date-and-time-value{text-align:left}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.7) brightness(1.3);cursor:pointer;padding:0;margin-left:6px}
textarea,input,button{outline:none;font-family:var(--f-body)}
button{-webkit-tap-highlight-color:transparent;touch-action:manipulation;cursor:pointer;border:none;background:none;color:inherit;font:inherit}
::-webkit-scrollbar{width:0;height:0}

/* === MODAL SCROLL LOCK (iOS Safari fix) === */
body.modal-open{overflow:hidden;position:fixed;width:100%;top:var(--scroll-y,0)}

/* === TYPOGRAPHY HELPERS === */
.dN{font-family:var(--f-display)}
.mN{font-family:var(--f-mono);font-variant-numeric:tabular-nums}
.bC{font-family:var(--f-cond)}
.num{font-family:var(--f-mono);font-variant-numeric:tabular-nums;font-weight:700}

/* === INTERACTION STATES === */
button,[role=button]{transition:transform .12s ease,filter .12s ease,background .12s ease}
button:active:not(:disabled),[role=button]:active{transform:scale(0.96)}
button:focus-visible,a:focus-visible,input:focus-visible,textarea:focus-visible{
  outline:2px solid var(--acc);outline-offset:2px;border-radius:var(--r-sm)
}
.card-tap{transition:transform .12s ease,background .15s ease}
.card-tap:active{transform:scale(0.985)}
input:focus,textarea:focus{border-color:var(--acc) !important}

/* === ANIMATIONS === */
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:0.3;transform:scale(1)}50%{opacity:1;transform:scale(1.3)}}
@keyframes prBurst{
  0%{opacity:0;transform:translate(-50%,-50%) scale(0.5)}
  15%{opacity:1;transform:translate(-50%,-50%) scale(1.2)}
  70%{opacity:1;transform:translate(-50%,-50%) scale(1)}
  100%{opacity:0;transform:translate(-50%,-50%) scale(0.95)}
}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,20px)}to{opacity:1;transform:translate(-50%,0)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
@keyframes timerPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes logoIntro{0%{transform:scale(0.94);opacity:0}60%{transform:scale(1.02);opacity:1}100%{transform:scale(1);opacity:1}}
@keyframes logoBreath{0%,100%{box-shadow:0 8px 24px var(--acc3)}50%{box-shadow:0 8px 32px var(--acc),0 0 0 4px var(--acc5)}}
.gt-logo-pulse{animation:logoIntro .42s cubic-bezier(.2,.8,.2,1),logoBreath 3.4s ease-in-out 0.6s infinite}
@keyframes countUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.gt-stat-num{animation:countUp .45s cubic-bezier(.2,.8,.2,1)}
@keyframes activeGlow{0%,100%{box-shadow:0 0 0 0 var(--acc5)}50%{box-shadow:0 0 0 6px var(--acc5)}}
.gt-scheda-active{animation:activeGlow 2.8s ease-in-out infinite}
.su{animation:slideUp .25s ease-out}
.fi{animation:fadeIn .2s ease-out}
.pr-burst{
  position:fixed;top:38%;left:50%;
  padding:20px 40px;background:var(--acc);color:var(--act);
  border-radius:var(--r-xl);
  font:32px/1 var(--f-display);letter-spacing:0.02em;
  z-index:999;pointer-events:none;
  box-shadow:0 8px 24px rgba(200,255,0,0.2);
  animation:prBurst 1.6s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
.toast{animation:toastIn .25s ease-out}
.timer-alert{animation:shake .3s ease-in-out 3, timerPulse 1s ease-in-out infinite}

/* === iOS PWA: safe area === */
@supports (padding: max(0px)) {
  @media (display-mode: standalone) {

}

/* === SPLASH === */
#splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .3s}
#splash.hide{opacity:0;pointer-events:none}
#splash .mark{position:relative;display:flex;align-items:baseline;gap:2px;margin-bottom:12px}
#splash .mark .letter{font-family:var(--f-display);font-size:96px;line-height:0.85;color:var(--text);letter-spacing:-0.04em}
#splash .mark .letter.accent{color:var(--acc)}
#splash .mark .bar{position:absolute;bottom:-8px;left:0;right:0;height:6px;background:var(--acc);border-radius:3px;animation:loadBar 1.4s cubic-bezier(0.4,0,0.2,1) infinite}
@keyframes loadBar{0%{transform:scaleX(0);transform-origin:left}50%{transform:scaleX(1);transform-origin:left}51%{transform:scaleX(1);transform-origin:right}100%{transform:scaleX(0);transform-origin:right}}
#splash .name{font-family:var(--f-cond);font-size:13px;letter-spacing:0.25em;color:var(--muted);text-transform:uppercase;font-weight:700;margin-top:10px}
#splash .subtitle{font-family:var(--f-body);font-size:11px;color:var(--muted-2);margin-top:6px}
</style>
</head>

var _scrollLockCount = 0;
function lockScroll(){
  if(_scrollLockCount === 0){
    document.body.style.setProperty('--scroll-y', '-' + window.scrollY + 'px');
    document.body.classList.add('modal-open');
  }
  _scrollLockCount++;
}
function unlockScroll(){
  _scrollLockCount = Math.max(0, _scrollLockCount - 1);
  if(_scrollLockCount === 0){
    document.body.classList.remove('modal-open');

/* Notifica push via Service Worker per timer recupero (sopravvive a schermo bloccato) */

/* Wake Lock helper — tiene lo schermo acceso durante la sessione */
function useWakeLock(active){
  useEffect(function(){
    if(!active) return;
    var wl = null;
    var cancelled = false;
    var onVis = function(){
      if(!document.hidden && wl === null && !cancelled){
        navigator.wakeLock.request('screen').then(function(l){
          if(cancelled){l.release().catch(function(){});return;}
          wl = l;
        }).catch(function(){});
      }
    };
    if('wakeLock' in navigator){
      navigator.wakeLock.request('screen').then(function(lock){
        if(cancelled){lock.release().catch(function(){});return;}
        wl = lock;
        document.addEventListener('visibilitychange', onVis);
      }).catch(function(){});
    }
    return function(){
      cancelled = true;
      document.removeEventListener('visibilitychange', onVis);
      if(wl){ wl.release().catch(function(){}); wl = null; }
    };
  }, [active]);
}

/* Rest timer hook — ancorato a Date.now() per sopravvivere a lock screen / throttling iOS.
   Ritorna [tmr, startRest, stopRest]. Il timer parte già con endsAt impostato, così
   l'effect dep `tmr.endsAt` cambia (null → timestamp) e il tick parte subito. */
function useRestTimer(){
  var _s = useState(null);
  var tmr = _s[0]; var setTmr = _s[1];

  useEffect(function(){
    if(!tmr || !tmr.endsAt) return;
    var endsAt = tmr.endsAt;
    var alerted = tmr.s <= 0;
    function tick(){
      var remaining = Math.max(0, Math.round((endsAt - Date.now())/1000));
      setTmr(function(t){ return t && t.endsAt === endsAt ? Object.assign({}, t, {s: remaining}) : t; });
      if(remaining <= 0 && !alerted){
        alerted = true;
        hap([100, 50, 100, 50, 250]);
        cancelTimerNotify();
        try{
          var ctx = new (window.AudioContext || window.webkitAudioContext)();
          var osc = ctx.createOscillator();
          var g = ctx.createGain();
          osc.connect(g); g.connect(ctx.destination);
          osc.frequency.value = 880; g.gain.value = 0.15;
          osc.start(); osc.stop(ctx.currentTime + 0.18);
          setTimeout(function(){ ctx.close && ctx.close(); }, 300);
        }catch(e){}
      }
    }
    tick();
    var id = setInterval(tick, 500);
    var onVis = function(){ if(!document.hidden) tick(); };
    document.addEventListener('visibilitychange', onVis);
    return function(){
      clearInterval(id);
      document.removeEventListener('visibilitychange', onVis);
    };
  }, [tmr && tmr.endsAt]);

  var startRest = useCallback(function(seconds, label){
    if(!seconds || seconds <= 0) return;
    ensureNotifPermission();
    notifyTimer(seconds, label || 'Recupero finito');
    setTmr({s: seconds, max: seconds, label: label || 'Recupero', endsAt: Date.now() + seconds*1000});
  }, []);

  var stopRest = useCallback(function(){
    setTmr(null);
    cancelTimerNotify();
  }, []);

  return [tmr, startRest, stopRest];
}

/* e1RM (1-rep max stimato) — formula Epley (default) o Brzycki */
function e1RM(peso, reps){
  if(!peso || !reps) return 0;
  if(reps <= 1) return peso;
  // Epley: 1RM = peso × (1 + reps/30)
  return Math.round(peso * (1 + reps/30));
}

/* Completion rate di una sessione: quante serie completate vs totali (0-100) */
function sessionCompletionRate(session){
  if(!session||!session.es||!session.es.length) return 0;
  var totalSets=0, doneSets=0;
  session.es.forEach(function(e){
    if(e.tipo==='riscaldamento'){
      totalSets++; if(e.fatto) doneSets++;
    } else {
      var serie=e.serie||[];
      totalSets+=serie.length;
      doneSets+=serie.filter(function(s){return s.ok;}).length;
    }
  });
  if(totalSets===0) return 100;
  return Math.round(doneSets/totalSets*100);
}
function completionLabel(rate){
  if(rate>=100) return {text:'Completato',color:'var(--success)',icon:'check-circle'};
  if(rate>=50) return {text:rate+'%',color:'var(--warning)',icon:'alert'};
  return {text:rate+'%',color:'var(--danger)',icon:'x-circle'};
}

/* Weekly adherence: confronta sessioni fatte vs obiettivo settimanale */
function getWeekSessions(sessions, weekStartDate){
  var start=new Date(weekStartDate); start.setHours(0,0,0,0);
  var end=new Date(start); end.setDate(end.getDate()+7);
  return sessions.filter(function(s){var d=new Date(s.t0);return d>=start&&d<end;});
}
function getWeekStart(date){
  var d=new Date(date); var day=d.getDay(); var diff=day===0?6:day-1;
  d.setDate(d.getDate()-diff); d.setHours(0,0,0,0); return d;
}
function getAdherenceWeeks(sessions, numWeeks){
  var weeks=[];
  var now=new Date();
  var currentWeekStart=getWeekStart(now);
  for(var i=0;i<numWeeks;i++){
    var ws=new Date(currentWeekStart);
    ws.setDate(ws.getDate()-i*7);
    var weekSess=getWeekSessions(sessions,ws);
    weeks.unshift({start:ws,sessions:weekSess,count:weekSess.length});
  }
  return weeks;
}
function getDayTrainingMap(sessions, weekStartDate){
  var map=[false,false,false,false,false,false,false];
  var start=new Date(weekStartDate); start.setHours(0,0,0,0);
  sessions.forEach(function(s){
    var d=new Date(s.t0);
    var ws=getWeekStart(d);
    if(ws.getTime()===start.getTime()){
      var day=d.getDay();
      var idx=day===0?6:day-1;
      map[idx]=true;
    }
  });
  return map;
}

/* PR detection: trova il miglior tonnellaggio per serie (peso×reps) o e1RM mai fatto per quell'esercizio */
function findBestSerie(esNome, allSessions, excludeSessionId){
  var bestVol = 0, bestE1 = 0;
  allSessions.forEach(function(s){
    if(excludeSessionId && s.id === excludeSessionId) return;
    s.es && s.es.forEach(function(e){
      if(e.nome !== esNome) return;
      (e.serie||[]).forEach(function(sr){
        if(!sr.ok) return;
        var vol = (sr.peso||0) * (sr.reps||0);
        var est = e1RM(sr.peso||0, sr.reps||0);
        if(vol > bestVol) bestVol = vol;
        if(est > bestE1) bestE1 = est;
      });
    });
  });
  return {vol: bestVol, e1: bestE1};
}

/* Storage helper PR mostrati (per evitare di riemettere lo stesso PR al re-render) */
var _shownPRs = {};
function markPRShown(esNome){ _shownPRs[esNome] = Date.now(); }
function wasPRShownRecently(esNome){ return _shownPRs[esNome] && (Date.now() - _shownPRs[esNome]) < 3000; }

/* Trova l'ultima sessione (in ordine cronologico decrescente) in cui è stato eseguito l'esercizio.
   Cerca su tutte le sessioni — incluse quelle di schede ora inattive — perché servono come
   riferimento per sapere "come è andata l'ultima volta" indipendentemente dalla scheda attiva. */
function findLastExerciseSession(esNome, allSessions, excludeSessionId){
  if(!esNome || !allSessions) return null;
  var sorted = allSessions.slice().sort(function(a,b){
    return new Date(b.t0) - new Date(a.t0);
  });
  for(var i=0;i<sorted.length;i++){
    var s = sorted[i];
    if(excludeSessionId && s.id === excludeSessionId) continue;
    var es = s.es || [];
    for(var j=0;j<es.length;j++){
      var e = es[j];
      if(e.nome !== esNome) continue;
      var done = (e.serie||[]).filter(function(sr){return sr.ok;});
      if(done.length > 0){
        return {session: s, es: e, serie: done, note: s.nota || '', t0: s.t0};
      }
    }
  }
  return null;
}

/* Calcola trend (up/down/flat) per serie temporale di {v:number}.
   Usa il delta cumulativo first → last in % per evitare oscillazioni casuali. */
function computeTrend(points){
  if(!points || points.length < 2) return {dir:'flat', pct:0, delta:0};
  var first = points[0].v, last = points[points.length-1].v;
  var delta = last - first;
  if(!first) return {dir: delta>0?'up':(delta<0?'down':'flat'), pct: 0, delta: delta};
  var pct = (delta / first) * 100;
  /* Soglia 3%: sotto è "stallo", oltre è trend reale */
  if(Math.abs(pct) < 3) return {dir:'flat', pct:pct, delta:delta};
  return {dir: pct > 0 ? 'up' : 'down', pct: pct, delta: delta};
}

/* === B9: SYNC CONFLICT RESOLUTION === */
/* Ogni record (sessione, scheda) ha lastModified. Per merge: tieni quello più recente.
   I record cancellati diventano tombstone (deleted:true, deletedAt) per propagare la cancellazione
   tra dispositivi. Tombstone più vecchi di TOMBSTONE_TTL_DAYS vengono ripuliti. */

var TOMBSTONE_TTL_DAYS = 30;

function touchRecord(r){
  if(!r) return r;
  return Object.assign({}, r, {lastModified: Date.now()});
}

function touchAll(arr){ return (arr||[]).map(touchRecord); }

/* Soft-delete: marca come tombstone invece di rimuovere */
function softDelete(arr, id){
  return (arr||[]).map(function(r){
    if(r.id !== id) return r;
    return Object.assign({}, r, {deleted: true, deletedAt: Date.now(), lastModified: Date.now()});
  });
}

/* Filtra i tombstone per le query UI (Home, Log, Stats non li vedono) */
function liveRecords(arr){
  return (arr||[]).filter(function(r){ return !r.deleted; });
}

/* Pulisce tombstone vecchi (chiamato in save) */
function pruneTombstones(arr){
  var cutoff = Date.now() - TOMBSTONE_TTL_DAYS * 86400000;
  return (arr||[]).filter(function(r){
    return !(r.deleted && r.deletedAt && r.deletedAt < cutoff);
  });
}

/* Merge intelligente: per ogni id, tieni il record con lastModified più recente.
   Se uno dei due è tombstone, il tombstone "vince" se è più recente. */
function mergeRecords(local, remote){
  var byId = {};
  (local||[]).forEach(function(r){ if(r && r.id) byId[r.id] = r; });
  (remote||[]).forEach(function(r){
    if(!r || !r.id) return;
    var existing = byId[r.id];
    if(!existing){ byId[r.id] = r; return; }
    var lLM = existing.lastModified || 0;
    var rLM = r.lastModified || 0;
    // Se mancano timestamp da entrambe le parti, preferisci il locale (conservativo)
    if(rLM > lLM) byId[r.id] = r;
  });
  return Object.values(byId);
}

function mergeData(local, remote){
  return {
    schede: pruneTombstones(mergeRecords(local.schede||[], remote.schede||[])),
    sessions: pruneTombstones(mergeRecords(local.sessions||[], remote.sessions||[])),
    profile: pickNewer(local.profile, remote.profile)
  };
}
function pickNewer(a, b){
  if(!a) return b; if(!b) return a;
  var aLM = a.lastModified || 0, bLM = b.lastModified || 0;
  return bLM > aLM ? b : a;
}

function findCalSkill(nome){
  if(!nome) return null;
  var n = nome.toLowerCase();
  for(var i=0;i<CAL_CATALOG.length;i++){
    var cat = CAL_CATALOG[i];
    for(var j=0;j<cat.es.length;j++){
      if(cat.es[j].n.toLowerCase() === n){
        return Object.assign({}, cat.es[j], {category: cat.label, categoryId: cat.id});
      }
    }
  }
  return null;
}

}
var TIPS={'Panca Piana':{exec:'Scapole retratte e bloccate, schiena arcuata, barra tocca il basso del petto. Spingi in traiettoria leggermente diagonale.',prog:'In stallo? Prova 5×5 con 90% del max. Aggiungi pausa 2s al petto per spezzare il punto morto.',motto:'La panca piana è il riferimento standard per la forza di spinta orizzontale. Il sovraccarico progressivo è il driver primario.'},'Squat':{exec:'Petto alto, core braced, ginocchia in linea con le punte. Scendi sotto il parallelo, sguardo avanti.',prog:'Pause squat (3s in fondo) rompono qualsiasi plateau. Prova anche front squat per variare.',motto:'Lo squat è il multi-articolare con il più alto reclutamento muscolare per gli arti inferiori.'},'Stacco da Terra':{exec:'Barra sopra le dita dei piedi, schiena neutra, braccia verticali. Spingi il pavimento, non tirare.',prog:'Deficit deadlift (+3cm) allarga il ROM e rompe gli stalli. Usa cinghie per superare il grip.',motto:'Lo stacco attiva più massa muscolare di qualsiasi altro singolo esercizio. La forma è prioritaria rispetto al carico.'},'Stacco Rumeno':{exec:'Schiena neutra, barra scorre vicino alle gambe, spingi i fianchi indietro. Non è uno squat.',prog:'Single-leg RDL corregge i squilibri tra i lati. Pausa a metà per attivare meglio.',motto:'La catena posteriore (glutei, femorali, erettori) contribuisce alla stabilità di anca, ginocchio e schiena.'},'Trazioni':{exec:'Partenza da braccia estese. Tira scapole giù e indietro prima dei gomiti. Petto verso la barra.',prog:'Non riesci ancora? Serie negative 5s. Ne fai 15+? Aggiungi peso con la cintura.',motto:'Le trazioni sviluppano dorsale, brachiale e core in un unico movimento. Il volume di pratica è il fattore chiave.'},'Rematore Bilanciere':{exec:'Busto quasi parallelo al suolo, barra tirata verso il basso addome, scapole retratte in cima.',prog:'Prova il Pendlay row (parte da terra ogni rep) per eliminare lo slancio totalmente.',motto:'Lo spessore della schiena dipende dal volume totale di tirate orizzontali. Il rematore con bilanciere è il più caricabile.'},'Lento Avanti':{exec:'Core stabile, non arcuare la bassa schiena. Barra in linea con le orecchie sopra la testa.',prog:'Alterna manubri e bilanciere. I manubri correggono gli squilibri e aumentano il ROM.',motto:'Il deltoide anteriore e medio rispondono bene al sovraccarico progressivo. Variare l\'attrezzo previene squilibri.'},'Alzate Laterali':{exec:'Leggera flessione al gomito, alza fino alla larghezza spalle. Nessuno slancio. Controlla la discesa.',prog:'2s su, 3s giù. La tensione conta più del peso. Prova dropset fino al cedimento.',motto:'Il deltoide laterale risponde meglio ad alto volume e tensione controllata che a carichi pesanti.'},'Hip Thrust':{exec:'Schiena sull\'anca della panca, imbottitura sulla barra. Spingi forte con i glutei, non con la schiena.',prog:'Mini-band sopra le ginocchia attiva i glutei medi. Pausa 1s in cima per più contrazione.',motto:'L\'hip thrust isola il grande gluteo meglio dello squat. Utile per correggere deficit nella catena posteriore.'},'Leg Press':{exec:'Piedi alti per femorali, bassi per quadricipiti. Non bloccare le ginocchia in estensione.',prog:'Dropset fino al cedimento: riduci il peso senza pausa. Pausa 3s in basso per più stimolo.',motto:'La leg press permette alto volume sugli arti inferiori con minor stress sul rachide rispetto allo squat.'},'Curl Bilanciere':{exec:'Gomiti fissi ai fianchi. Contrai il bicipite in cima, abbassa lentamente in 3-4 secondi.',prog:'Metodo 21: 7 reps metà bassa + 7 metà alta + 7 complete. Intensità senza aumentare il peso.',motto:'Il bicipite ha due capi: la presa e l\'angolo determinano quale lavora di più. Il tempo sotto tensione è cruciale.'},'French Press':{exec:'Gomiti verso il soffitto, non allargarli. Abbassa la barra verso la fronte controllato.',prog:'Prova al cavo basso per tensione costante. Skull crusher EZ bar è più ergonomico.',motto:'I tricipiti compongono circa il 60% della massa del braccio. Il capo lungo si allunga meglio sopra la testa.'},'Pull-up':{exec:'Partenza da braccia estese. Tira le scapole giù prima dei gomiti. Petto verso la barra.',prog:'Non riesci? Negatives 5s. Ne fai 15+? Aggiungi peso alla cintura. Chin-ups per variare.',motto:'Il pull-up è l\'esercizio a corpo libero con il maggior potenziale di sovraccarico. Frequenza e volume sono i fattori chiave.'},'Dip':{exec:'Busto in avanti per il petto, verticale per i tricipiti. Abbassa fino a 90° al gomito.',prog:'Non riesci? Macchina assistita. Ne fai 15+? Aggiungi peso. Ring dip per instabilità.',motto:'Il dip è il multi-articolare più efficiente per la parte superiore di spinta. L\'angolo del busto determina il focus muscolare.'},'Push-up':{exec:'Mani sotto le spalle, corpo dritto, petto sfiora il suolo. Spingi completamente.',prog:'Progressioni: inclinato → standard → pike → archer → pseudo planche → monobraccio.',motto:'Il push-up a corpo libero attiva petto, tricipiti e core con intensità proporzionale al peso corporeo.'},'Plank':{exec:'Corpo dritto dalla testa ai talloni. Contrai addome, glutei e quadricipiti. Respira normalmente.',prog:'Plank dinamico: solleva un braccio alternato. Poi prova il plank con pesi sul dorso.',motto:'Il plank attiva la muscolatura profonda del core (trasverso addominale). Il tempo sotto tensione è più rilevante della durata massima.'},
'Panca piana multipower':{exec:'Scapole retratte e bloccate prima di abbassare il bilanciere. La guida del multipower è verticale: assicurati che la barra tocchi il basso del petto, non la gola. Mai sbloccare le scapole durante il movimento.',prog:'Con la progressione in scheda, aumenta prima il volume poi il carico. Pausa 2s al petto per spezzare il punto morto nelle settimane pesanti.',motto:'Il multipower guida la traiettoria: utile per isolare il petto riducendo il contributo degli stabilizzatori.'},
'Croci alla macchina':{exec:'Regola il sedile: le impugnature al livello del petto, gomiti leggermente flessi fissi. Chiudi davanti senza sbattere le mani. Controlla la fase di ritorno in 3-4 secondi — è lì che avvengono i danni.',prog:'Pausa 2s al picco della contrazione per più ipertrofia. Dropset fino al cedimento come tecnica intensificatrice.',motto:'Le croci alla macchina enfatizzano la fase concentrica del pettorale. Il picco di contrazione è il momento chiave.'},
'Alzate laterali manubri':{exec:'Leggera flessione al gomito, alza fino alla larghezza delle spalle. Nessuno slancio: se oscilli il busto, il peso è troppo. Il controllo nella discesa (3s) è la metà del lavoro.',prog:'2s su, 3s giù. La tensione conta più del peso. Dropset fino al cedimento per più volume sulle spalle.',motto:'Il deltoide laterale ha un braccio di leva corto: il controllo eccentrico (3s) genera più stimolo ipertrofico del carico.'},
'Lat machine supina':{exec:'Presa supina a larghezza spalle. Prima di tirare, deprimiamo le scapole verso il basso — poi portano i gomiti. Tira verso il petto alto, non verso l\'ombelico. Evita di buttare il busto all\'indietro: annulla il lavoro della schiena.',prog:'Stessa progressione della panca: segui le settimane. Pausa 1s con barra al petto per contrarre meglio il grande dorsale.',motto:'La presa supina enfatizza il bicipite e il grande dorsale inferiore rispetto alla presa prona.'},
'Pulley presa neutra spalle':{exec:'Seduto eretto, non inclinarti indietro. Tira verso il basso addome, scapole retratte in cima. Ritorno lento e controllato — non lasciare che il peso si riprenda la postura. Gomiti vicini al busto.',prog:'Pausa 1s in contrazione massima. Riduci il peso e aumenta il TUT (tempo sotto tensione) per variare lo stimolo.',motto:'La presa neutra riduce lo stress su spalla e polso. Il focus è sullo spessore del dorsale e del romboide.'},
'Pulldown corda cavo alto':{exec:'Dividi la corda verso i lati del viso. Gomiti che scendono oltre le spalle. Busto fermo, non oscillare. Il movimento viene dai gomiti, non dalle mani.',prog:'Più reps controllate battono più peso con slancio. Prova con pausa 2s a fine movimento per massimizzare la contrazione del tricipite laterale.',motto:'Il cavo alto mantiene tensione costante lungo tutto il ROM, a differenza dei pesi liberi.'},
'Curl manubri panca 45°':{exec:'La panca inclinata allunga il bicipite in partenza: vantaggio meccanico unico — sfruttalo. Gomiti fermi, non portarli avanti. Supina il polso in cima alla contrazione. Nessuno slancio.',prog:'Lavora a 2s su e 3s giù. Non caricare più del necessario: la forma è tutto su questo angolo.',motto:'L\'angolo inclinato allunga il capo lungo del bicipite, aumentando lo stimolo meccanico in posizione allungata.'},
'French press manubri':{exec:'Gomiti puntati verso il soffitto per tutta la serie — non lasciarli allargarsi. Abbassa i manubri verso le orecchie in modo controllato. Nessun rimbalzo in fondo: rischio al gomito.',prog:'Prova con un manubrio unico a due mani per una presa più stabile. Pausa 1s in fondo per più ROM.',motto:'I manubri offrono più libertà di traiettoria al gomito rispetto al bilanciere, riducendo lo stress articolare.'},
'Dragon flag':{exec:'Testa, spalle e braccia incollate alla panca. Abbassa il corpo rigido come un\'asse: se i fianchi cedono, fermati. Core completamente contratto in ogni fase. Scendi lento (3-4s), sali controllato.',prog:'Inizia con le ginocchia piegate (tuck dragon flag). Aumenta il ROM progressivamente man mano che la forza del core cresce.',motto:'Il dragon flag è un esercizio avanzato che richiede forza del core superiore alla media. La progressione è graduale.'},
'Crunch inversi a terra':{exec:'Schiena bassa incollata al pavimento per tutto il movimento. Solleva il bacino usando gli addominali, non lo slancio delle gambe. Espira nella salita, inspira nella discesa. Gambe perpendicolari al suolo in partenza.',prog:'Prova con gambe più tese per aumentare il carico sul core. In futuro aggiungi peso alle caviglie.',motto:'Il crunch inverso attiva il retto addominale inferiore. Il controllo del bacino è la chiave dell\'efficacia.'},
'V-ups gambe tese':{exec:'Gambe dritte, braccia verso i piedi. Togli la schiena bassa da terra nell\'incontro mani-piedi — non rimbalzare. Se la schiena si incurva eccessivamente, piega leggermente le ginocchia.',prog:'Inizia con ginocchia piegate. Quando padroneggi la forma, tendi le gambe. Max reps significa qualità fino all\'ultima ripetizione possibile.',motto:'La qualità della contrazione addominale è correlata al ROM controllato, non al numero di ripetizioni.'},
'Hyperextension':{exec:'Bacino sul cuscinetto, non la pancia. Muoviti fino al parallelo con il pavimento — iperestendere oltre mette a rischio le lombari. Tieni il collo neutro, non sollevare la testa. Stringi i glutei in cima.',prog:'A corpo libero → mani al petto → mani dietro la testa → peso al petto. Progressione semplice e sicura.',motto:'L\'hyperextension rinforza erettori spinali e glutei, riducendo il rischio di infortuni lombari nei multi-articolari.'},
'V-Squat':{exec:'Piedi a larghezza spalle sulla piattaforma inclinata. Schiena completamente appoggiata allo schienale, core attivo. Scendi finché le cosce sono parallele, ginocchia allineate con le punte — non verso l\'interno.',prog:'Segui la progressione in scheda. Il V-squat guida la traiettoria ma non elimina la tecnica: testa alta e core braced sempre.',motto:'Il V-squat guida la traiettoria riducendo il carico sulla schiena. Utile per alto volume con minor rischio.'},
'Stacchi rumeni manubri':{exec:'Schiena completamente neutra — non arrotondata. I manubri scorrono vicino alle gambe. Il movimento viene dai fianchi che spingono indietro, non dalla schiena che si abbassa. Ferma il movimento quando senti lo stiramento nei femorali.',prog:'Prova monopodalico per correggere squilibri tra lato destro e sinistro. Pausa a metà per attivare meglio.',motto:'I manubri permettono una traiettoria più naturale e correggono squilibri bilaterali nei femorali.'},
'Leg press':{exec:'Piedi alti per enfatizzare i femorali, bassi per i quadricipiti. Non bloccare le ginocchia in estensione. Non lasciare che le anche si sollievino dal sedile in fondo — segnale che il peso è eccessivo.',prog:'Dropset fino al cedimento: riduci il peso senza pausa. Pausa 3s in fondo per più stimolo muscolare.',motto:'La posizione dei piedi sulla piattaforma determina il reclutamento: alta per femorali, bassa per quadricipiti.'},
'Affondi bulgari':{exec:'Piede posteriore sul banco, non troppo vicino. Scendi verticalmente: il ginocchio anteriore non deve proiettarsi oltre la punta del piede. Tronco eretto. Tutta la spinta dal tallone del piede anteriore.',prog:'Inizia a corpo libero, poi manubri ai fianchi, poi bilanciere. Correggono gli squilibri tra i lati meglio di qualsiasi altro esercizio per le gambe.',motto:'L\'affondo bulgaro è il gold standard per correggere asimmetrie di forza tra gli arti inferiori.'},
'Leg extension monolat':{exec:'Regola il sedile: l\'articolazione del ginocchio allineata con il fulcro della macchina — fondamentale per la salute del ginocchio. Estendi completamente ma senza scattare. Ritorno lento in 3s.',prog:'Monolaterale per correggere squilibri. Quando i due lati sono bilanciati, valuta il passaggio al bilaterale per più carico.',motto:'La leg extension monolaterale identifica e corregge deficit di forza tra quadricipiti destro e sinistro.'},
'Leg curl':{exec:'Bacino schiacciato al supporto per isolare il femorale — evita di sollevare i glutei. Piega lentamente senza far scattare i talloni. Tieni la contrazione 1 secondo in cima prima di scendere.',prog:'Pausa 1s in cima, 3s in discesa. Prova una gamba alla volta per parità tra i lati. Femorali forti = ginocchia sane.',motto:'Il rapporto femorali/quadricipiti ideale è circa 0.6. Femorali forti riducono il rischio di lesioni al crociato.'},
'Polpacci seduto':{exec:'Ginocchia a 90°: questo angolo attiva il soleo (la parte profonda del polpaccio). Range completo: tallone al massimo in basso, punta al massimo in alto. Nessun rimbalzo in fondo — il tendine d\'Achille ringrazia.',prog:'Alto volume, recuperi brevi: i polpacci rispondono alla fatica. Superserie seduto+piedi per colpire entrambi i fasci muscolari.',motto:'Il polpaccio seduto attiva il soleo (fibre lente), che risponde meglio ad alto volume e rep range elevato.'},
'Polpacci in piedi':{exec:'Piede completo su un gradino per massimizzare il ROM. Sali sul metatarso, mantieni 1s in cima. Scendi lentamente fino all\'allungamento massimo. Ginocchio quasi esteso per attivare il gastrocnemio.',prog:'Varia la posizione dei piedi: neutro, punte fuori, punte dentro per angolazioni diverse. Aggiungi peso progressivamente.',motto:'In piedi il gastrocnemio (fibre rapide) è il motore primario. Risponde meglio a carichi più alti e rep range moderato.'}};

function getFreq(){try{return JSON.parse(localStorage.getItem(FK))||{};}catch(e){return {};}}
function addFreq(n){var f=getFreq();f[n]=(f[n]||0)+1;try{localStorage.setItem(FK,JSON.stringify(f));}catch(e){}}
function getSugg(base,search,max){var freq=getFreq();var combined=base.slice();Object.keys(freq).forEach(function(n){if(combined.indexOf(n)<0)combined.push(n);});var filtered=search?combined.filter(function(n){return n.toLowerCase().indexOf(search.toLowerCase())>=0;}):combined;filtered.sort(function(a,b){return (freq[b]||0)-(freq[a]||0);});return filtered.slice(0,max||10);}
/* ── pulizia chiavi localStorage legacy (pre-cloud, v1.8.6) ──
   Eseguita una sola volta per device. Rimuove dati utente che potrebbero
   essere stati lasciati da installazioni precedenti, evitando leak cross-user
   se più persone usano la stessa app su un device condiviso.
   Sopravvivono solo: tema (TK), frequenza esercizi (FK), token Supabase. */
(function cleanupLegacyStorage(){
  try{
    if(localStorage.getItem('gymtracker_legacy_cleaned_v186')) return;
    var legacyKeys=['gymtracker_v9','gymtracker_profile','gymtracker_migrated_v1',
                    'gymtracker_token','gymtracker_gist_id'];
    legacyKeys.forEach(function(k){ try{ localStorage.removeItem(k); }catch(e){} });
    var snapKeys=[];
    for(var i=0;i<localStorage.length;i++){
      var k=localStorage.key(i);
      if(k && k.indexOf('gymtracker_snap_')===0) snapKeys.push(k);
    }
    snapKeys.forEach(function(k){ try{ localStorage.removeItem(k); }catch(e){} });
    localStorage.setItem('gymtracker_legacy_cleaned_v186', new Date().toISOString());
  }catch(e){}
})();

/* mapping local shape ↔ DB rows */
function profileLocalToRow(p, userId){
  if(!p) return null;
  return {
    id: userId,
    nome: p.nome || null,
    data_nascita: p.dataNascita || null,
    peso: (p.peso === '' || p.peso == null) ? null : Number(p.peso),
    altezza: (p.altezza === '' || p.altezza == null) ? null : Number(p.altezza),
    obiettivo: p.obiettivo || null,
    livello: p.livello || null,
    theme: (function(){ try{ return loadTheme().id; }catch(e){ return 'lime'; } })(),
    freq: (function(){ try{ return getFreq(); }catch(e){ return {}; } })(),
    last_modified: p.lastModified || Date.now(),
    updated_at: new Date().toISOString()
  };
}
function profileRowToLocal(row){
  if(!row) return null;
  return {
    nome: row.nome || '',
    dataNascita: row.data_nascita || '',
    peso: row.peso != null ? String(row.peso) : '',
    altezza: row.altezza != null ? String(row.altezza) : '',
    obiettivo: row.obiettivo || 'Ipertrofia',
    livello: row.livello || 'Intermedio',
    lastModified: row.last_modified || 0
  };
}
function schedaLocalToRow(s, userId){
  return {
    id: s.id,
    user_id: userId,
    name: s.nome || s.name || null,
    data: s,
    last_modified: s.lastModified || Date.now(),
    deleted: !!s.deleted,
    deleted_at: s.deletedAt || null,
    updated_at: new Date().toISOString()
  };
}
function sessionLocalToRow(s, userId){
  return {
    id: s.id,
    user_id: userId,
    scheda_id: s.sId || null,
    block_id: s.bId || null,
    type: s.tipo === 'cal' ? 'cal' : 'pesi',
    started_at: s.t0 || null,
    duration_sec: s.dur || null,
    mood: typeof s.umore === 'number' ? s.umore : null,
    note: s.nota || null,
    data: s,
    last_modified: s.lastModified || Date.now(),
    deleted: !!s.deleted,
    deleted_at: s.deletedAt || null,
    updated_at: new Date().toISOString()
  };
}

async function sbLoadAll(){
  if(!sb) return null;
  var user = await sbGetUser();
  if(!user) return null;
  var results = await Promise.all([
    sb.from('profiles').select('*').eq('id', user.id).maybeSingle(),
    sb.from('schede').select('data').eq('user_id', user.id),
    sb.from('sessions').select('data').eq('user_id', user.id)
  ]);
  var profileRes = results[0], schedeRes = results[1], sessionsRes = results[2];
  if(profileRes.error) console.warn('sb profile load', profileRes.error);
  if(schedeRes.error) console.warn('sb schede load', schedeRes.error);
  if(sessionsRes.error) console.warn('sb sessions load', sessionsRes.error);
  return {
    profileRow: profileRes.data || null,
    schede: (schedeRes.data || []).map(function(r){ return r.data; }).filter(Boolean),
    sessions: (sessionsRes.data || []).map(function(r){ return r.data; }).filter(Boolean)
  };
}

async function sbPushProfile(profile){
  if(!sb || !profile) return;
  var user = await sbGetUser();
  if(!user) return;
  var row = profileLocalToRow(profile, user.id);
  var r = await sb.from('profiles').upsert(row, { onConflict: 'id' });
  if(r.error) throw r.error;
}
async function sbPushSchede(schede){
  if(!sb || !schede || !schede.length) return;
  var user = await sbGetUser();
  if(!user) return;
  var rows = schede.map(function(s){ return schedaLocalToRow(s, user.id); });
  for(var i=0;i<rows.length;i+=80){
    var chunk = rows.slice(i, i+80);
    var r = await sb.from('schede').upsert(chunk, { onConflict: 'user_id,id' });
    if(r.error) throw r.error;
  }
}
async function sbPushSessions(sessions){
  if(!sb || !sessions || !sessions.length) return;
  var user = await sbGetUser();
  if(!user) return;
  var rows = sessions.map(function(s){ return sessionLocalToRow(s, user.id); });
  for(var i=0;i<rows.length;i+=80){
    var chunk = rows.slice(i, i+80);
    var r = await sb.from('sessions').upsert(chunk, { onConflict: 'user_id,id' });
    if(r.error) throw r.error;
  }
}
async function sbPushAll(data){
  if(!sb) return;
  await Promise.all([
    data.profile ? sbPushProfile(data.profile) : Promise.resolve(),
    sbPushSchede(data.schede || []),
    sbPushSessions(data.sessions || [])
  ]);
}

/* invio feedback (per quando venderai l'app) */
async function sbSendFeedback(payload){
  if(!sb) throw new Error('Supabase non disponibile');
  var user = await sbGetUser();
  if(!user) throw new Error('Non autenticato');
  return sb.from('feedback').insert({
    user_id: user.id,
    type: payload.type || 'opinion',

/* Conta schede + sessioni per ogni utente, in batch (1 query per tabella) */

  var results = await Promise.all([
    sb.from('schede').select('user_id', {count:'exact'}).eq('deleted', false),
    sb.from('sessions').select('user_id, started_at').eq('deleted', false).order('started_at', {ascending: false})

/* ── ADMIN WRITE/DELETE OPERATIONS ──
   Tutte queste richiedono le policy admin UPDATE/DELETE lato DB (vedi SQL).
   Le DELETE su schede/sessions sono soft-delete con tombstone, così il merge
   client-cloud propaga la cancellazione anche sui device dell'utente. */

async function adminUpdateProfile(userId, updates){
  if(!sb) throw new Error('Supabase non disponibile');
  var payload = Object.assign({}, updates, {
    last_modified: Date.now(),
    updated_at: new Date().toISOString()
  });
  var r = await sb.from('profiles').update(payload).eq('id', userId);
  if(r.error) throw r.error;
  return true;
}

async function adminSoftDeleteScheda(userId, schedaId){
  if(!sb) throw new Error('Supabase non disponibile');
  var now = Date.now();
  /* Aggiornamento del JSON `data` per propagare il tombstone anche nel campo che il client legge */
  var fetchRes = await sb.from('schede').select('data').eq('user_id', userId).eq('id', schedaId).maybeSingle();
  if(fetchRes.error) throw fetchRes.error;
  var newData = Object.assign({}, fetchRes.data && fetchRes.data.data || {}, {deleted:true, deletedAt:now, lastModified:now});
  var r = await sb.from('schede').update({
    deleted: true, deleted_at: now, last_modified: now, data: newData,
    updated_at: new Date().toISOString()
  }).eq('user_id', userId).eq('id', schedaId);
  if(r.error) throw r.error;
  return true;
}

async function adminSoftDeleteSession(userId, sessionId){
  if(!sb) throw new Error('Supabase non disponibile');
  var now = Date.now();
  var fetchRes = await sb.from('sessions').select('data').eq('user_id', userId).eq('id', sessionId).maybeSingle();
  if(fetchRes.error) throw fetchRes.error;
  var newData = Object.assign({}, fetchRes.data && fetchRes.data.data || {}, {deleted:true, deletedAt:now, lastModified:now});
  var r = await sb.from('sessions').update({
    deleted: true, deleted_at: now, last_modified: now, data: newData,
    updated_at: new Date().toISOString()
  }).eq('user_id', userId).eq('id', sessionId);
  if(r.error) throw r.error;
  return true;
}

async function adminDeleteFeedback(feedbackId){
  if(!sb) throw new Error('Supabase non disponibile');
  var r = await sb.from('feedback').delete().eq('id', feedbackId);
  if(r.error) throw r.error;
  return true;
}

/* Elimina utente completamente. Chiama la Edge Function admin-delete-user
   che usa il service_role per cancellare da auth.users (cascade su tutte le tabelle).
   Non si può fare con anon key — auth.users è protetto. */
async function adminDeleteUser(userId){
  if(!sb) throw new Error('Supabase non disponibile');
  var r = await sb.functions.invoke('admin-delete-user', { body: { user_id: userId } });
  if(r.error) throw new Error((r.error && r.error.message) || 'Errore eliminazione utente');

}

    if(typeof s.durata !== 'undefined' && s.durata) return s.durata + 's';

<script>
/* ── settings ── */
function Settings(p){
  var profile=p.profile,onProfile=p.onProfile,go=p.go;
  var _1=useState(loadTheme().id);var themeId=_1[0];var setThemeId=_1[1];
  var _2=useState(Object.assign({},profile||{nome:'',dataNascita:'',peso:'',altezza:'',obiettivo:'Ipertrofia',livello:'Intermedio'}));
  var form=_2[0];var setForm=_2[1];
  function set(k,v){setForm(function(prev){var u=Object.assign({},prev);u[k]=v;return u;});}
  function pickTheme(t){applyTheme(t);setThemeId(t.id);}
  var inp={width:'100%',background:SURF2,border:'1px solid '+BORD,borderRadius:10,padding:'11px 12px',color:TEXT,fontSize:14,marginBottom:10};
  /* Account Supabase */
  var _a=useState(null); var sbUser=_a[0]; var setSbUser=_a[1];
  var _fb=useState(''); var fbMsg=_fb[0]; var setFbMsg=_fb[1];
  var _fbs=useState(false); var fbSending=_fbs[0]; var setFbSending=_fbs[1];
  var _fbo=useState(''); var fbOk=_fbo[0]; var setFbOk=_fbo[1];
  useEffect(function(){
    if(!sb) return;
    sbGetUser().then(function(u){ setSbUser(u); });
  },[]);
  async function handleLogout(){
    if(!confirm('Vuoi davvero uscire? I dati restano sul cloud, puoi rientrare quando vuoi.')) return;
    await sbSignOut();
    window.location.reload();
  }
  async function handleSendFeedback(){
    if(!fbMsg.trim()){ alert('Scrivi qualcosa prima di inviare'); return; }
    setFbSending(true); setFbOk('');
    try{
      var r = await sbSendFeedback({type:'opinion', message:fbMsg.trim(), appVersion:'2.0.0'});
      if(r.error) throw r.error;
      setFbMsg(''); setFbOk('Feedback ricevuto.');
      setTimeout(function(){ setFbOk(''); }, 3500);
    }catch(e){
      alert('Errore invio: '+(e.message||e));
    }finally{
      setFbSending(false);
    }
  }
  function handleExport(){
    var data={
      version:'1.2.0',
      exportedAt:new Date().toISOString(),
      schede:p.schede||[],
      sessions:p.sessions||[],
      profile:profile||null,
      theme:loadTheme().id,
      freq:getFreq(),
      bodyLog: loadBodyLog()
    };
    var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url;
    a.download='gymtracker-backup-'+new Date().toISOString().split('T')[0]+'.json';
    document.body.appendChild(a);a.click();
    setTimeout(function(){URL.revokeObjectURL(url);if(a.parentNode)a.parentNode.removeChild(a);},100);
  }
  /* Export per nutrizionista: report leggibile (CSV + HTML) con misure corporee
     e riepilogo settimanale degli allenamenti. Pensato per la condivisione. */
  function handleExportNutrizionista(format){
    var bodyLog = loadBodyLog().slice().sort(function(a,b){return new Date(a.t)-new Date(b.t);});
    var allSessions = (p.sessions||[]).slice().sort(function(a,b){return new Date(a.t0)-new Date(b.t0);});

    /* Aggrega per settimana (ISO week — usa lunedì come inizio settimana) */
    function weekKey(d){
      var dt = new Date(d);
      var day = dt.getDay(); var diff = day===0?6:day-1;
      dt.setDate(dt.getDate()-diff); dt.setHours(0,0,0,0);
      return dt.toISOString().slice(0,10);
    }
    var weeks = {};
    allSessions.forEach(function(s){
      var k = weekKey(s.t0);
      if(!weeks[k]) weeks[k] = {sessions:0, totMin:0, totTon:0, totReps:0, gruppi:{}, esercizi:{}};
      weeks[k].sessions += 1;
      weeks[k].totMin += s.dur||0;
      (s.es||[]).forEach(function(e){
        if(e.tipo==='riscaldamento') return;
        var t = ton([e]);
        weeks[k].totTon += t;
        var reps = (e.serie||[]).filter(function(sr){return sr.ok;}).reduce(function(a,sr){return a+(sr.reps||0);},0);
        weeks[k].totReps += reps;
        if(e.gr){
          var grKey = (e.gr==='Bicipiti'||e.gr==='Tricipiti') ? 'Braccia' : e.gr;
          var sets = (e.serie||[]).filter(function(sr){return sr.ok;}).length;
          weeks[k].gruppi[grKey] = (weeks[k].gruppi[grKey]||0) + sets;
        }
        weeks[k].esercizi[e.nome] = (weeks[k].esercizi[e.nome]||0) + 1;
      });
    });
    var weekKeys = Object.keys(weeks).sort();

    var altezzaCmExp = profile && profile.altezza ? parseFloat(String(profile.altezza).replace(',','.')) : null;

    if(format === 'csv'){
      /* CSV con due sezioni: misure + settimane */
      var sections = [];
      sections.push('=== MISURE CORPOREE ===');
      var bodyHeaders = ['Data'].concat(BODY_FIELDS.map(function(f){return f.lbl+' ('+f.unit+')';})).concat(['BMI (kg/m²)','Note']);
      var bodyRows = bodyLog.map(function(r){
        var bmi = calcBmi(r.peso, altezzaCmExp);
        return [r.t.slice(0,10)].concat(BODY_FIELDS.map(function(f){return r[f.k]||'';})).concat([bmi!=null?bmi:'', r.note||'']);
      });
      sections.push(buildCsv(bodyHeaders, bodyRows));
      sections.push('');
      sections.push('=== RIEPILOGO SETTIMANALE ALLENAMENTI ===');
      var wkHeaders = ['Settimana (lun)','Sessioni','Durata totale (min)','Tonnellaggio (kg)','Reps totali','Volume per gruppo (serie)'];
      var wkRows = weekKeys.map(function(k){
        var w = weeks[k];
        var grStr = Object.keys(w.gruppi).map(function(g){return g+':'+w.gruppi[g];}).join(' | ');
        return [k, w.sessions, Math.round(w.totMin), Math.round(w.totTon), w.totReps, grStr];
      });
      sections.push(buildCsv(wkHeaders, wkRows));
      sections.push('');
      sections.push('=== PROFILO ===');
      sections.push('Nome,'+csvCell(profile&&profile.nome||''));
      sections.push('Età,'+(profile&&profile.dataNascita?Math.floor((Date.now()-new Date(profile.dataNascita))/(365.25*86400000)):''));
      sections.push('Altezza (cm),'+csvCell(profile&&profile.altezza||''));
      sections.push('Obiettivo,'+csvCell(profile&&profile.obiettivo||''));
      downloadFile('gymtracker-nutrizionista-'+todayISO()+'.csv', sections.join('\n'), 'text/csv;charset=utf-8');
      return;
    }

    /* Formato testo umano leggibile (più facile da inviare alla nutrizionista) */
    function dateIT(d){ return new Date(d).toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric'}); }
    var L = [];
    L.push('REPORT PROGRESSI — '+(profile&&profile.nome||'')+' — '+dateIT(new Date()));
    L.push('================================================');
    L.push('');
    L.push('PROFILO');
    if(profile){
      if(profile.dataNascita) L.push('  Età: '+Math.floor((Date.now()-new Date(profile.dataNascita))/(365.25*86400000))+' anni');
      if(profile.altezza) L.push('  Altezza: '+profile.altezza+' cm');
      if(profile.obiettivo) L.push('  Obiettivo: '+profile.obiettivo);
      if(profile.livello) L.push('  Livello: '+profile.livello);
    }
    L.push('');
    if(bodyLog.length){
      L.push('MISURE CORPOREE ('+bodyLog.length+' rilevazioni)');
      L.push('------------------------------------------------');
      bodyLog.forEach(function(r){
        L.push(dateIT(r.t)+':');
        BODY_FIELDS.forEach(function(f){
          if(r[f.k]!==undefined && r[f.k]!==null && r[f.k]!==''){
            L.push('    '+f.lbl+': '+r[f.k]+' '+f.unit);
          }
        });
        var bmiR = calcBmi(r.peso, altezzaCmExp);
        if(bmiR != null){
          var cat = bmiCategory(bmiR);
          L.push('    BMI: '+bmiR+' kg/m²' + (cat?' ('+cat.label+')':''));
        }
        if(r.note) L.push('    Nota: '+r.note);
        L.push('');
      });
      /* Confronto prima/ultima */
      if(bodyLog.length>=2){
        var first = bodyLog[0], last = bodyLog[bodyLog.length-1];
        L.push('VARIAZIONI (prima → ultima)');
        L.push('------------------------------------------------');
        BODY_FIELDS.forEach(function(f){
          if(first[f.k]!==undefined && last[f.k]!==undefined && first[f.k]!=='' && last[f.k]!==''){
            var d = parseFloat(last[f.k])-parseFloat(first[f.k]);
            L.push('  '+f.lbl+': '+first[f.k]+' → '+last[f.k]+' '+f.unit+'  ('+(d>=0?'+':'')+(Math.round(d*10)/10)+' '+f.unit+')');
          }
        });
        var bmiF = calcBmi(first.peso, altezzaCmExp), bmiL = calcBmi(last.peso, altezzaCmExp);
        if(bmiF != null && bmiL != null){
          var dBmi = bmiL - bmiF;
          L.push('  BMI: '+bmiF+' → '+bmiL+' kg/m²  ('+(dBmi>=0?'+':'')+(Math.round(dBmi*10)/10)+' kg/m²)');
        }
        L.push('');
      }
    } else {
      L.push('(Nessuna misurazione corporea registrata)');
      L.push('');
    }
    if(weekKeys.length){
      L.push('ALLENAMENTI PER SETTIMANA');
      L.push('------------------------------------------------');
      weekKeys.slice(-12).forEach(function(k){
        var w = weeks[k];
        L.push('Sett. '+k+' — '+w.sessions+' sessioni · '+Math.round(w.totMin)+' min · '+Math.round(w.totTon)+' kg tonnellaggio');
        var grs = Object.keys(w.gruppi).sort();
        if(grs.length) L.push('    Set per gruppo: '+grs.map(function(g){return g+' '+w.gruppi[g];}).join(', '));
      });
      L.push('');
      var totalSess = weekKeys.reduce(function(a,k){return a+weeks[k].sessions;},0);
      var totalTon = weekKeys.reduce(function(a,k){return a+weeks[k].totTon;},0);
      L.push('TOTALI: '+totalSess+' sessioni · '+Math.round(totalTon)+' kg tonnellaggio · su '+weekKeys.length+' settimane attive');
      L.push('');
    }
    L.push('================================================');
    L.push('Generato da PumpLog — '+new Date().toLocaleString('it-IT'));
    downloadFile('gymtracker-nutrizionista-'+todayISO()+'.txt', L.join('\n'), 'text/plain;charset=utf-8');
  }
  function handleImport(ev){
    var f=ev.target.files[0];if(!f)return;
    var rd=new FileReader();

      try{
        var d=JSON.parse(rd.result);

        alert('Backup ripristinato con successo.');
      }catch(e){alert('File non valido: '+e.message);}
    };
    rd.readAsText(f);ev.target.value='';
  }
  return h('div',{style:{padding:'24px 16px 100px'}},
    h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:22}},
      h('div',{style:{fontFamily:"'Bebas Neue',cursive",fontSize:32,letterSpacing:'0.03em'}},'Impostazioni'),
      h('button',{onClick:function(){go('home');},'aria-label':'Chiudi impostazioni',style:{background:'none',border:'none',color:MUTED,cursor:'pointer'}},h(Icon,{n:'close',sz:20,c:MUTED}))
    ),
    h(Lbl,null,'Colore tema'),
    h('div',{style:{display:'flex',gap:10,marginBottom:22}},
      THEMES.map(function(t){
        var on=themeId===t.id;
        return h('button',{key:t.id,onClick:function(){pickTheme(t);},style:{width:36,height:36,borderRadius:'50%',background:t.hex,border:on?'3px solid '+TEXT:'3px solid transparent',cursor:'pointer',flexShrink:0,position:'relative'}},
          on&&h('div',{style:{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center'}},h(Icon,{n:'check',sz:14,c:t.text}))
        );
      })
    ),
    h('div',{style:{height:1,background:BORD,marginBottom:20}}),
    /* Account Supabase */
    sb && h('div',null,
      h(Lbl,null,'Account'),
      h('div',{style:{background:SURF2,borderRadius:12,padding:14,marginBottom:10}},
        sbUser ? h('div',null,
          h('div',{style:{fontSize:11,color:MUTED,marginBottom:4,textTransform:'uppercase',letterSpacing:'0.25em'}},'Loggato come'),
          h('div',{style:{fontSize:14,fontWeight:600,marginBottom:10,wordBreak:'break-all'}},sbUser.email||'utente'),
          h('div',{style:{display:'flex',alignItems:'center',gap:6,marginBottom:12}},
            h('div',{style:{width:7,height:7,borderRadius:'50%',background:'var(--success)'}}),
            h('span',{style:{fontSize:11,color:MUTED}},'Sincronizzazione cloud attiva')
          ),
          h('button',{onClick:handleLogout,style:{width:'100%',padding:'10px 14px',borderRadius:10,border:'1px solid '+BORD,background:'transparent',color:'#EF4444',fontSize:13,fontWeight:600,cursor:'pointer'}},'Esci dall\'account')
        ) : h('div',{style:{fontSize:13,color:MUTED}},'Non autenticato')
      ),
      /* Admin entry — visibile SOLO se l'email matcha la lista ADMIN_EMAILS */
      isCurrentUserAdmin(sbUser) && h('button',{
        onClick:function(){ go('admin'); },
        style:{width:'100%',background:SURF2,border:'1px solid '+ACC,borderRadius:12,padding:'12px 14px',marginBottom:10,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'space-between',gap:10,color:TEXT}
      },
        h('div',{style:{textAlign:'left'}},
          h('div',{style:{fontSize:13,fontWeight:700,color:ACC,marginBottom:2,letterSpacing:'0.25em',textTransform:'uppercase'}},'ADMIN PANEL'),
          h('div',{style:{fontSize:11,color:MUTED}},'Vedi tutti gli utenti e i loro dati')

function Home(p){

  var sorted=sessions.slice().sort(function(a,b){return new Date(b.t0)-new Date(a.t0);});

  for(var i=0;i<sorted.length;i++){var sd=new Date(sorted[i].t0);sd.setHours(0,0,0,0);if((chk-sd)/86400000<=1){streak++;chk=sd;}else break;}

    h('div',{style:{fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.25em',color:TEXT,marginBottom:8,lineHeight:1.1}},'Ogni serie conta. Inizia a loggarle.'),

  return h('div',{style:{padding:'24px 16px'}},
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:22}},
      h('div',null,
        h('div',{style:{fontSize:12,color:MUTED}},'Questa settimana'),
        h('div',{style:{fontFamily:"'Bebas Neue',cursive",fontSize:34,letterSpacing:'0.03em',lineHeight:1}},nome?'Ciao, '+nome:'Il tuo log')
      ),
      h('div',{style:{display:'flex',alignItems:'center',gap:8}},
        (function(){

          return h('div',{onClick:tips[sc]?function(){alert(tips[sc]);}:undefined,style:{display:'flex',alignItems:'center',gap:6,background:SURF2,border:'0.5px solid '+(sc==='error'?'var(--danger-bord)':BORD),borderRadius:20,padding:'6px 11px',cursor:tips[sc]?'pointer':'default',boxShadow:sc==='ok'?'0 0 0 1px rgba(200,255,0,0.15)':'none'}},

      var remainingDays=6-todayIdx;

        });

      });
    });
  };
}
function makeAddSerie(setEs){
  return function(idx){
    setEs(function(prev){
      return prev.map(function(ex,i){
        if(i!==idx)return ex;
        var last=ex.serie[ex.serie.length-1];
        var ns={n:ex.serie.length+1,peso:last?last.peso:0,reps:last?last.reps:10,ok:false,t:null};
        if(last && typeof last.durata !== 'undefined') ns.durata = last.durata;

}

function makeRemoveSerie(setEs){
  return function(idx, si){
    setEs(function(prev){
      return prev.map(function(ex,i){
        if(i!==idx) return ex;

}

  var filtered = sorted.filter(function(s){

    if(filter==='week' && new Date(s.t0).getTime() < weekAgo) return false;
    if(filter==='month'&& new Date(s.t0).getTime() < monthAgo) return false;
    if(search.trim()){

      var hay = (sessionLabel(s) + ' ' + exerciseNames(s) + ' ' + (s.nota||'')).toLowerCase();

  /* Raggruppamento per settimana (chiave: lunedì della settimana) */
  function weekKey(date){
    var d = new Date(date);
    var day = d.getDay(); // 0=domenica
    var diff = day === 0 ? 6 : day - 1; // lunedì
    d.setDate(d.getDate() - diff);
    d.setHours(0,0,0,0);

    var nowMonday = weekKey(new Date());

    var lastMonday = weekKey(new Date(Date.now() - 7*86400000));
    if(key === lastMonday) return 'Settimana scorsa';
    return fmt(monday) + ' – ' + fmt(sunday);
  }

/* ── stats ── */
function Stats(p){

    );
  }
  var cutoff=new Date(Date.now()-range*86400000);
  var prevCutoff=new Date(Date.now()-range*2*86400000);
  var data=sessions.filter(function(s){return new Date(s.t0)>=cutoff;});
  /* Periodo precedente per confronto delta */
  var prevData=sessions.filter(function(s){var t=new Date(s.t0);return t>=prevCutoff && t<cutoff;});
  var pesiData=data.filter(function(s){return s.tipo!=='cal';});
  var calData=data.filter(function(s){return s.tipo==='cal';});

  var byEx={};
  pesiData.forEach(function(s){s.es.forEach(function(e){if(e.tipo==='riscaldamento')return;var t=ton([e]);if(t>0){byEx[e.nome]=(byEx[e.nome]||0)+t;}});});
  var topExs=Object.entries(byEx).sort(function(a,b){return b[1]-a[1];}).slice(0,5);
  var maxT=topExs.length?topExs[0][1]:1;

  var calByEx={};
  calData.forEach(function(s){s.es.forEach(function(e){var reps=e.serie.filter(function(sr){return sr.ok;}).reduce(function(a,sr){return a+sr.reps;},0);if(reps>0)calByEx[e.nome]=(calByEx[e.nome]||0)+reps;});});

  /* B2: Volume per gruppo muscolare (set completati per gruppo) */

    return pct;

      h('div',{style:{fontSize:13,lineHeight:1.55,marginBottom:18}},'Completa il primo allenamento e PumpLog farà il resto:',h('br'),'grafici, trend, PR — tutto calcolato per te.'),
      h('button',{onClick:function(){go('start');},style:{padding:'12px 22px',background:ACC,color:ACT,border:'none',borderRadius:10,fontWeight:700,fontSize:14,cursor:'pointer',letterSpacing:'0.02em'}},'Inizia ad allenarti →')

          {n:Math.round(pesiData.reduce(function(t,s){return t+ton(s.es);},0)/100)/10+'t', lbl:'Volume', d:(dTon ? (dTon>0?'+':'')+dTon+'%' : null), tip:'Peso totale sollevato (kg × ripetizioni di tutte le serie). 1t = 1000kg. Cresce quando ti alleni di più o con carichi più pesanti.'},

/* ── grafico SVG semplice ── */
function Chart(p){
  var data=p.data;
  if(!data||data.length<2)return h('div',{style:{textAlign:'center',padding:30,color:MUTED,fontSize:12}},'Servono almeno 2 sessioni per il grafico');
  var w=320,hg=120,pad=14;
  var max=Math.max.apply(null,data.map(function(d){return d.v;}))*1.05;
  var min=Math.min.apply(null,data.map(function(d){return d.v;}))*0.95;
  var rg=max-min||1;
  var pts=data.map(function(d,i){return {x:pad+(i/(data.length-1))*(w-pad*2),y:hg-pad-((d.v-min)/rg)*(hg-pad*2),v:d.v};});
  var pathD=pts.map(function(p,i){return (i===0?'M':'L')+p.x.toFixed(1)+','+p.y.toFixed(1);}).join(' ');
  return h('svg',{width:'100%',height:hg,viewBox:'0 0 '+w+' '+hg,style:{display:'block'}},
    h('path',{d:pathD+' L '+pts[pts.length-1].x.toFixed(1)+','+(hg-pad)+' L '+pts[0].x.toFixed(1)+','+(hg-pad)+' Z',fill:ACC5}),
    h('path',{d:pathD,stroke:ACC,strokeWidth:2,fill:'none',strokeLinecap:'round',strokeLinejoin:'round'}),
    pts.map(function(p,i){return h('circle',{key:i,cx:p.x,cy:p.y,r:3,fill:ACC,stroke:BG,strokeWidth:1});})
  );
}

/* ── BodyMultiChart: grafico panoramico tutte le metriche (normalizzato %) ── */
var METRIC_COLORS = {
  peso:'#F0EFE8', massaGrassaKg:'#D6D4CC', massaMagraKg:'#BDB9B1',
  acquaTotale:'#A8A49C', acquaExtra:'#948F87', acquaIntra:'#807B73',
  vita:'#C8C4BC', fianchi:'#B3AFA7', addome:'#9E9A92', coscia:'#8A857D',
  bmi:'#706B63'
};
function BodyMultiChart(p){
  var series=p.series; // [{key, lbl, color, pts:[{t0,v}]}]
  if(!series||!series.length) return null;
  var valid=series.filter(function(s){return s.pts.length>=2;});
  if(!valid.length) return h('div',{style:{textAlign:'center',padding:20,color:MUTED,fontSize:12}},'Servono almeno 2 misurazioni per la panoramica.');
  var w=340, hg=180, padL=36, padR=14, padT=18, padB=32;
  var chartW=w-padL-padR, chartH=hg-padT-padB;
  var norm=valid.map(function(s){
    var base=s.pts[0].v;
    return {key:s.key, lbl:s.lbl, color:s.color, pts:s.pts.map(function(pt,i){
      var pct=base?((pt.v-base)/base)*100:0;
      return {idx:i, total:s.pts.length, pct:pct, v:pt.v, t0:pt.t0};
    })};
  });
  var allPct=[]; norm.forEach(function(s){s.pts.forEach(function(pt){allPct.push(pt.pct);});});
  var maxP=Math.max.apply(null,allPct), minP=Math.min.apply(null,allPct);
  var margin=Math.max(5, (maxP-minP)*0.12);
  maxP+=margin; minP-=margin;
  var rg=maxP-minP||1;
  var gridLines=[-10,-5,0,5,10,15,20].filter(function(v){return v>=minP&&v<=maxP;});
  if(!gridLines.length) gridLines=[Math.round(minP),0,Math.round(maxP)];
  var focusKey=p.focusKey;
  return h('svg',{width:'100%',height:hg,viewBox:'0 0 '+w+' '+hg,style:{display:'block',marginBottom:8}},
    gridLines.map(function(gv,i){
      var gy=padT+chartH-((gv-minP)/rg)*chartH;
      return h('g',{key:'g'+i},
        h('line',{x1:padL,x2:w-padR,y1:gy,y2:gy,stroke:'rgba(255,255,255,0.06)',strokeWidth:0.5}),
        h('text',{x:padL-4,y:gy+3,textAnchor:'end',fill:'rgba(240,239,232,0.32)',fontSize:9,fontFamily:"'Roboto Mono',monospace"},
          (gv>=0?'+':'')+Math.round(gv)+'%')
      );
    }),
    h('line',{x1:padL,x2:w-padR,y1:padT+chartH-((0-minP)/rg)*chartH,y2:padT+chartH-((0-minP)/rg)*chartH,stroke:'rgba(255,255,255,0.15)',strokeWidth:1,strokeDasharray:'4,3'}),
    norm.map(function(s){
      var isFocused=!focusKey||focusKey===s.key;
      var lineColor=focusKey&&focusKey===s.key?ACC:s.color;
      var pts=s.pts.map(function(pt){
        return {x:padL+(pt.idx/(pt.total-1))*chartW,y:padT+chartH-((pt.pct-minP)/rg)*chartH,pct:pt.pct};
      });
      var pathD=pts.map(function(pt,i){return (i===0?'M':'L')+pt.x.toFixed(1)+','+pt.y.toFixed(1);}).join(' ');
      return h('g',{key:s.key,opacity:isFocused?1:0.18},
        h('path',{d:pathD,stroke:lineColor,strokeWidth:isFocused?2.5:1.5,fill:'none',strokeLinecap:'round',strokeLinejoin:'round'}),
        isFocused && pts.length>0 && h('circle',{cx:pts[pts.length-1].x,cy:pts[pts.length-1].y,r:4,fill:lineColor,stroke:BG,strokeWidth:1.5}),
        isFocused && pts.length>0 && h('text',{x:Math.min(pts[pts.length-1].x+6,w-padR-20),y:pts[pts.length-1].y+3,fill:lineColor,fontSize:10,fontWeight:700,fontFamily:"'Roboto Mono',monospace"},
          (s.pts[s.pts.length-1].pct>=0?'+':'')+Math.round(s.pts[s.pts.length-1].pct)+'%')
      );
    })
  );
}

/* ── BodyFocusChart: grafico singola metrica con valori reali, griglia, etichette ── */
function BodyFocusChart(p){
  var data=p.data, unit=p.unit||'', label=p.label||'', color=p.color||ACC;
  if(!data||data.length<2) return null;
  var w=340, hg=170, padL=40, padR=14, padT=16, padB=36;
  var chartW=w-padL-padR, chartH=hg-padT-padB;
  var vals=data.map(function(d){return d.v;});
  var maxV=Math.max.apply(null,vals), minV=Math.min.apply(null,vals);
  var spread=maxV-minV;
  var marginV=Math.max(spread*0.15, maxV*0.02||0.5);
  maxV+=marginV; minV=Math.max(0,minV-marginV);
  var rg=maxV-minV||1;
  var step=spread>20?10:(spread>5?2:(spread>1?1:0.5));
  var gridVals=[];
  for(var gv=Math.ceil(minV/step)*step; gv<=maxV; gv+=step) gridVals.push(Math.round(gv*10)/10);
  if(gridVals.length>6){step=step*2; gridVals=[];for(gv=Math.ceil(minV/step)*step;gv<=maxV;gv+=step)gridVals.push(Math.round(gv*10)/10);}
  var pts=data.map(function(d,i){
    return {x:padL+(i/(data.length-1))*chartW, y:padT+chartH-((d.v-minV)/rg)*chartH, v:d.v, t0:d.t0};
  });
  var pathD=pts.map(function(pt,i){return (i===0?'M':'L')+pt.x.toFixed(1)+','+pt.y.toFixed(1);}).join(' ');
  var areaD=pathD+' L '+pts[pts.length-1].x.toFixed(1)+','+(padT+chartH)+' L '+pts[0].x.toFixed(1)+','+(padT+chartH)+' Z';
  var hexToRgba=function(hex,a){var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return 'rgba('+r+','+g+','+b+','+a+')';};
  var showDateEvery=Math.max(1,Math.ceil(data.length/5));
  return h('svg',{width:'100%',height:hg,viewBox:'0 0 '+w+' '+hg,style:{display:'block'}},
    gridVals.map(function(gv,i){
      var gy=padT+chartH-((gv-minV)/rg)*chartH;
      return h('g',{key:'fg'+i},
        h('line',{x1:padL,x2:w-padR,y1:gy,y2:gy,stroke:'rgba(255,255,255,0.06)',strokeWidth:0.5}),
        h('text',{x:padL-4,y:gy+3,textAnchor:'end',fill:'rgba(240,239,232,0.4)',fontSize:9,fontFamily:"'Roboto Mono',monospace"},
          String(gv).replace('.',','))

/* ── BodyTrendMessage: messaggio comprensibile per non esperti ── */
function BodyTrendMessage(p){
  var trend=p.trend, metric=p.metric, unit=p.unit, inverse=p.inverse;
  if(!trend||!trend.dir||trend.dir==='flat') return h('div',{style:{fontSize:12,color:'var(--warning)',textAlign:'center',padding:'8px 12px',background:'rgba(245,158,11,0.06)',borderRadius:8,lineHeight:1.5}},
    'Stabile — il valore non e\' cambiato in modo significativo.');
  var abs=Math.abs(Math.round(trend.delta*10)/10);
  var dir=trend.dir;
  var isGood=(inverse?(dir==='down'):(dir==='up'));
  var color=isGood?'var(--success)':'var(--danger)';
  var icon=isGood?'↗':'↘';
  var msg;
  if(isGood){
    msg=metric+' '+(dir==='up'?'aumentato':'diminuito')+' di '+String(abs).replace('.',',')+unit+'. Stai andando nella direzione giusta.';
  } else {
    msg=metric+' '+(dir==='up'?'aumentato':'diminuito')+' di '+String(abs).replace('.',',')+unit+'. Tieni d\'occhio questo valore.';
  }
  return h('div',{style:{fontSize:12,color:color,textAlign:'center',padding:'8px 12px',background:isGood?'rgba(200,255,0,0.06)':'rgba(239,68,68,0.06)',borderRadius:8,lineHeight:1.5}},
    h('span',{style:{fontWeight:700,marginRight:4}},icon), msg
  );
}

/* ── dettaglio esercizio progressione ── */
function EsDetail(p){
  var nome=p.nome,sessions=p.sessions,onClose=p.onClose;
  var hist=[];
  var isCalEx = false;
  sessions.slice().sort(function(a,b){return new Date(a.t0)-new Date(b.t0);}).forEach(function(s){
    s.es.forEach(function(e){
      if(e.nome!==nome) return;
      if(s.tipo==='cal' || e.modalita==='hold') isCalEx = true;
      var f=e.serie.filter(function(sr){return sr.ok;});
      if(!f.length) return;
      var t = f.reduce(function(a,sr){return a+(sr.peso||0)*(sr.reps||0);},0);
      var mx = f.length ? Math.max.apply(null,f.map(function(sr){return rm1(sr.peso||0,sr.reps||0);})) : 0;
      var reps = f.reduce(function(a,sr){return a+(sr.reps||0);},0);
      var dur = f.reduce(function(a,sr){return a+(sr.durata||0);},0);
      hist.push({t0:s.t0, v:t, mx:mx, sets:f.length, reps:reps, dur:dur, note:s.nota||''});
    });
  });
  var rev=hist.slice().reverse();
  /* Metrica principale: tonnellaggio per pesi, reps totali per cal, secondi per hold */
  var primary = hist.map(function(x){
    if(x.dur > 0) return {v: x.dur};
    if(x.v > 0) return {v: x.v};
    return {v: x.reps};

  var trend = computeTrend(primary);
  var primaryLabel = isCalEx ? (hist.some(function(x){return x.dur>0;}) ? 'Secondi totali (hold)' : 'Ripetizioni totali') : 'Tonnellaggio (kg)';
  var first = primary.length ? primary[0].v : 0;

        h('div',{style:{flex:1,minWidth:0}},
          h('div',{style:{fontFamily:"'Bebas Neue',cursive",fontSize:32,letterSpacing:'0.02em',lineHeight:1.1,marginBottom:hist.length>=2?4:0}},nome),
          hist.length>=2 && h('div',{style:{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}},
            h(TrendBadge,{trend:trend,showLabel:true}),
            h('span',{style:{fontSize:11,color:MUTED}}, 'da ' + Math.round(first) + ' a ' + Math.round(last))
          )

/* ── BodyView: misure corporee + grafici trend + export ──
   Gestisce: registrazione entry (peso, %BF, %LBM, circonferenze), storico,
   grafici trend per ogni metrica, export CSV per nutrizionista. */
var BODY_FIELDS = [
  /* Composizione — peso si pre-popola dal profilo, BMI è auto-calcolato (non field) */
  {k:'peso',           lbl:'Peso',            unit:'kg', group:'comp'},
  {k:'massaGrassaKg',  lbl:'Massa grassa',    unit:'kg', group:'comp'},
  {k:'massaMagraKg',   lbl:'Massa magra',     unit:'kg', group:'comp'},
  /* Idratazione */
  {k:'acquaTotale',    lbl:'Acqua totale',          unit:'L', group:'idro'},
  {k:'acquaExtra',     lbl:'Acqua extracellulare',  unit:'L', group:'idro'},
  {k:'acquaIntra',     lbl:'Acqua intracellulare',  unit:'L', group:'idro'},
  /* Circonferenze (4 punti chiave) */
  {k:'vita',     lbl:'Vita',    unit:'cm', group:'circ'},
  {k:'fianchi',  lbl:'Fianchi', unit:'cm', group:'circ'},
  {k:'addome',   lbl:'Addome',  unit:'cm', group:'circ'},
  {k:'coscia',   lbl:'Coscia',  unit:'cm', group:'circ'}
];
/* Field "virtuale" calcolato: BMI = peso / (altezza_m)^2.
   Non si inserisce manualmente, ma viene incluso nei grafici trend e nelle KPI.
   Categoria OMS: <18.5 sottopeso · 18.5-24.9 normo · 25-29.9 sovrappeso · ≥30 obeso. */
function calcBmi(peso, altezzaCm){
  var p = parseFloat(String(peso).replace(',','.'));
  var a = parseFloat(String(altezzaCm).replace(',','.'));
  if(!p || !a || a <= 0) return null;
  var m = a / 100;
  return Math.round((p / (m*m)) * 10) / 10;
}
function bmiCategory(bmi){
  if(bmi == null) return null;
  if(bmi < 18.5) return {label:'sottopeso', color:'#3B82F6'};
  if(bmi < 25)   return {label:'normopeso', color:'var(--success)'};
  if(bmi < 30)   return {label:'sovrappeso', color:'var(--warning)'};
  return {label:'obesità', color:'var(--danger)'};
}
function BodyView(p){
  var log = p.log || [];
  var setLog = p.setLog;
  var profile = p.profile;
  var altezzaCm = profile && profile.altezza ? parseFloat(String(profile.altezza).replace(',','.')) : null;
  var _f = useState(false); var formOpen = _f[0]; var setFormOpen = _f[1];
  var _ed = useState(null); var editing = _ed[0]; var setEditing = _ed[1];
  var _sel = useState('peso'); var selMetric = _sel[0]; var setSelMetric = _sel[1];
  var _vm = useState('panoramica'); var viewMode = _vm[0]; var setViewMode = _vm[1];
  var _fk = useState(null); var chartFocus = _fk[0]; var setChartFocus = _fk[1];

  var sorted = log.slice().sort(function(a,b){return new Date(a.t) - new Date(b.t);});
  var hasData = sorted.length > 0;
  var last = sorted.length ? sorted[sorted.length-1] : null;
  var first = sorted.length ? sorted[0] : null;

  function pointsFor(key){
    return sorted.map(function(r){
      var v;
      if(key === 'bmi'){
        v = calcBmi(r.peso, altezzaCm);
      } else {
        v = r[key];
      }
      if(v === undefined || v === null || v === '') return null;
      var n = parseFloat(String(v).replace(',','.'));
      if(isNaN(n)) return null;
      return {t0: r.t, v: n};
    }).filter(Boolean);
  }
  function trendFor(key){ return computeTrend(pointsFor(key)); }
  function valueFor(rec, key){
    if(!rec) return null;
    if(key === 'bmi') return calcBmi(rec.peso, altezzaCm);
    return (rec[key]!==undefined && rec[key]!==null && rec[key]!=='') ? rec[key] : null;
  }

  function saveEntry(entry){
    var arr;
    if(editing && editing.id){
      arr = log.map(function(x){return x.id===editing.id ? Object.assign({}, x, entry, {lastModified:Date.now()}) : x;});
      saveBodyLog(arr);
    } else {
      arr = addBodyEntry(entry);
    }
    setLog(arr);
    setFormOpen(false);
    setEditing(null);
  }
  function deleteEntry(id){
    if(!confirm('Eliminare questa misurazione?')) return;
    setLog(delBodyEntry(id));
  }

  function exportCsv(){
    var rows = sorted.map(function(r){
      var bmi = calcBmi(r.peso, altezzaCm);
      return [r.t.slice(0,10)].concat(BODY_FIELDS.map(function(f){return r[f.k]||'';})).concat([bmi!=null?bmi:'', r.note||'']);
    });
    var headers = ['Data'].concat(BODY_FIELDS.map(function(f){return f.lbl+' ('+f.unit+')';})).concat(['BMI (kg/m²)','Note']);
    var csv = buildCsv(headers, rows);
    downloadFile('gymtracker-misure-'+todayISO()+'.csv', csv, 'text/csv;charset=utf-8');
  }

  /* Metriche disponibili per il grafico: include BMI come pseudo-field calcolato */
  var BMI_FIELD = {k:'bmi', lbl:'BMI', unit:'kg/m²'};
  var allFields = BODY_FIELDS.concat([BMI_FIELD]);
  var selPts = pointsFor(selMetric);
  var selField = allFields.find(function(f){return f.k===selMetric;}) || BODY_FIELDS[0];
  var selTrend = computeTrend(selPts);
