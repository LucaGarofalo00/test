<style>
/* === DESIGN SYSTEM TOKENS === */
:root{
  /* Accent (themable) */
  --acc:#C8FF00;
  --acc2:rgba(200,255,0,0.13);
  --acc3:rgba(200,255,0,0.20);
  --acc5:rgba(200,255,0,0.09);
  --act:#000;
  /* Neutrals */
  --bg:#0C0C0D;
  --surf-1:#161618;
  --surf-2:#202022;
  --surf-3:#2A2A2D;
  --bord-1:rgba(255,255,255,0.06);
  --bord-2:rgba(255,255,255,0.10);
  --text:#F0EFE8;
  --muted:rgba(240,239,232,0.55);
  --muted-2:rgba(240,239,232,0.32);
  /* Semantic */
  --danger:#EF4444;
  --danger-bg:rgba(239,68,68,0.10);
  --danger-bord:rgba(239,68,68,0.30);
  --success:#22C55E;
  --warning:#F59E0B;
  /* Spacing */
  --sp-1:4px; --sp-2:8px; --sp-3:12px; --sp-4:16px; --sp-5:24px; --sp-6:32px; --sp-7:48px;
  /* Radius */
  --r-sm:6px; --r-md:10px; --r-lg:14px; --r-xl:20px; --r-full:999px;
  /* Type */
  --f-display:'Bebas Neue',cursive;
  --f-cond:'Barlow Condensed',sans-serif;
  --f-body:'Barlow',sans-serif;
  --f-mono:'Roboto Mono',monospace;
}

/* === RESET === */
*{box-sizing:border-box;margin:0;padding:0}
html,body{overscroll-behavior-y:none;-webkit-tap-highlight-color:transparent}
body{
  background:var(--bg);color:var(--text);font-family:var(--f-body);
  min-height:100vh;min-height:100dvh;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
  font-variant-numeric:tabular-nums;
}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}
/* date input: rimuove lo styling nativo iOS Safari che faceva uscire l'input dal contenitore */
input[type=date]{-webkit-appearance:none;appearance:none;max-width:100%;min-height:46px}
input[type=date]::-webkit-date-and-time-value{text-align:left}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.7) brightness(1.3);cursor:pointer;padding:0;margin-left:6px}
textarea,input,button{outline:none;font-family:var(--f-body)}
button{-webkit-tap-highlight-color:transparent;touch-action:manipulation;cursor:pointer;border:none;background:none;color:inherit;font:inherit}
::-webkit-scrollbar{width:0;height:0}

/* === TYPOGRAPHY HELPERS === */
.dN{font-family:var(--f-display)}
.mN{font-family:var(--f-mono);font-variant-numeric:tabular-nums}
.bC{font-family:var(--f-cond)}
.num{font-family:var(--f-mono);font-variant-numeric:tabular-nums;font-weight:700}

/* === INTERACTION STATES === */
button,[role=button]{transition:transform .12s ease,filter .12s ease,background .12s ease}
button:active:not(:disabled),[role=button]:active{transform:scale(0.96)}
button:focus-visible,a:focus-visible,input:focus-visible,textarea:focus-visible{
  outline:2px solid var(--acc);outline-offset:2px;border-radius:var(--r-sm)
}
.card-tap{transition:transform .12s ease,background .15s ease}
.card-tap:active{transform:scale(0.985)}
input:focus,textarea:focus{border-color:var(--acc) !important}

/* === ANIMATIONS === */
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:0.3;transform:scale(1)}50%{opacity:1;transform:scale(1.3)}}
@keyframes prBurst{
  0%{opacity:0;transform:translate(-50%,-50%) scale(0.5)}
  15%{opacity:1;transform:translate(-50%,-50%) scale(1.2)}
  70%{opacity:1;transform:translate(-50%,-50%) scale(1)}
  100%{opacity:0;transform:translate(-50%,-50%) scale(0.95)}
}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,20px)}to{opacity:1;transform:translate(-50%,0)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
@keyframes timerPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
.su{animation:slideUp .25s ease-out}
.fi{animation:fadeIn .2s ease-out}
.pr-burst{
  position:fixed;top:38%;left:50%;
  padding:20px 40px;background:var(--acc);color:var(--act);
  border-radius:var(--r-xl);
  font:32px/1 var(--f-display);letter-spacing:0.05em;
  z-index:999;pointer-events:none;
  box-shadow:0 12px 48px rgba(200,255,0,0.4);
  animation:prBurst 1.6s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
.toast{animation:toastIn .25s ease-out}
.timer-alert{animation:shake .3s ease-in-out 3, timerPulse 1s ease-in-out infinite}

/* === iOS PWA: safe area === */
@supports (padding: max(0px)) {
  @media (display-mode: standalone) {
    body { padding-bottom: env(safe-area-inset-bottom, 0); }
  }
}

/* === SPLASH === */
#splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .3s}
#splash.hide{opacity:0;pointer-events:none}
#splash .mark{position:relative;display:flex;align-items:baseline;gap:2px;margin-bottom:12px}
#splash .mark .letter{font-family:var(--f-display);font-size:96px;line-height:0.85;color:var(--text);letter-spacing:-0.04em}
#splash .mark .letter.accent{color:var(--acc)}
#splash .mark .bar{position:absolute;bottom:-8px;left:0;right:0;height:6px;background:var(--acc);border-radius:3px;animation:loadBar 1.4s cubic-bezier(0.4,0,0.2,1) infinite}
@keyframes loadBar{0%{transform:scaleX(0);transform-origin:left}50%{transform:scaleX(1);transform-origin:left}51%{transform:scaleX(1);transform-origin:right}100%{transform:scaleX(0);transform-origin:right}}
#splash .name{font-family:var(--f-cond);font-size:13px;letter-spacing:0.25em;color:var(--muted);text-transform:uppercase;font-weight:700;margin-top:10px}
#splash .subtitle{font-family:var(--f-body);font-size:11px;color:var(--muted-2);margin-top:6px;letter-spacing:0.02em}
</style>
</head>

/* === HELPERS GLOBALI === */

/* Haptic feedback — usato in tutte le interazioni tattili importanti */
function hap(pattern){
  try{ if(navigator.vibrate) navigator.vibrate(pattern); }catch(e){}
}

/* Notifica push via Service Worker per timer recupero (sopravvive a schermo bloccato) */
function notifyTimer(seconds, label){
  try{
    if(!('serviceWorker' in navigator) || !navigator.serviceWorker.controller) return;
    if(typeof Notification === 'undefined' || Notification.permission !== 'granted') return;
    navigator.serviceWorker.controller.postMessage({
      type:'START_REST_TIMER',
      seconds: seconds,
      label: label || 'Recupero finito'
    });
  }catch(e){}
}
function cancelTimerNotify(){
  try{
    if(!('serviceWorker' in navigator) || !navigator.serviceWorker.controller) return;
    navigator.serviceWorker.controller.postMessage({type:'CANCEL_REST_TIMER'});
  }catch(e){}
}

/* Richiede permesso notifiche (chiamato la prima volta che parte un timer) */
var _notifAsked = false;
function ensureNotifPermission(){
  if(_notifAsked) return;
  _notifAsked = true;
  try{
    if(typeof Notification !== 'undefined' && Notification.permission === 'default'){
      Notification.requestPermission().catch(function(){});
    }
  }catch(e){}
}

/* Wake Lock helper — tiene lo schermo acceso durante la sessione */
function useWakeLock(active){
  useEffect(function(){
    if(!active) return;
    var wl = null;
    var release = function(){};
    if('wakeLock' in navigator){
      navigator.wakeLock.request('screen').then(function(lock){
        wl = lock;
        // Riacquisisce il lock quando l'app torna in foreground
        var onVis = function(){
          if(!document.hidden && wl === null){
            navigator.wakeLock.request('screen').then(function(l){ wl = l; }).catch(function(){});
          }
        };
        document.addEventListener('visibilitychange', onVis);
        release = function(){ document.removeEventListener('visibilitychange', onVis); };
      }).catch(function(){});
    }
    return function(){
      release();
      if(wl){ wl.release().catch(function(){}); wl = null; }
    };
  }, [active]);
}

      if(remaining <= 0 && !alerted){
        alerted = true;
        hap([100, 50, 100, 50, 250]);
        cancelTimerNotify();
        try{
          var ctx = new (window.AudioContext || window.webkitAudioContext)();
          var osc = ctx.createOscillator();
          var g = ctx.createGain();
          osc.connect(g); g.connect(ctx.destination);
          osc.frequency.value = 880; g.gain.value = 0.15;
          osc.start(); osc.stop(ctx.currentTime + 0.18);
          setTimeout(function(){ ctx.close && ctx.close(); }, 300);
        }catch(e){}
      }
    }
    tick();
    var id = setInterval(tick, 500);
    var onVis = function(){ if(!document.hidden) tick(); };
    document.addEventListener('visibilitychange', onVis);
    return function(){
      clearInterval(id);
      document.removeEventListener('visibilitychange', onVis);
    };
  }, [tmr && tmr.endsAt]);

  var startRest = useCallback(function(seconds, label){
    if(!seconds || seconds <= 0) return;
    ensureNotifPermission();
    notifyTimer(seconds, label || 'Recupero finito');
    setTmr({s: seconds, max: seconds, label: label || 'Recupero', endsAt: Date.now() + seconds*1000});
  }, []);

  var stopRest = useCallback(function(){
    setTmr(null);
    cancelTimerNotify();
  }, []);

  return [tmr, startRest, stopRest];
}

/* e1RM (1-rep max stimato) — formula Epley (default) o Brzycki */
function e1RM(peso, reps){
  if(!peso || !reps) return 0;
  if(reps <= 1) return peso;
  // Epley: 1RM = peso × (1 + reps/30)
  return Math.round(peso * (1 + reps/30));
}

/* PR detection: trova il miglior tonnellaggio per serie (peso×reps) o e1RM mai fatto per quell'esercizio */
function findBestSerie(esNome, allSessions, excludeSessionId){
  var bestVol = 0, bestE1 = 0;
  allSessions.forEach(function(s){
    if(excludeSessionId && s.id === excludeSessionId) return;
    s.es && s.es.forEach(function(e){
      if(e.nome !== esNome) return;
      (e.serie||[]).forEach(function(sr){
        if(!sr.ok) return;
        var vol = (sr.peso||0) * (sr.reps||0);
        var est = e1RM(sr.peso||0, sr.reps||0);
        if(vol > bestVol) bestVol = vol;
        if(est > bestE1) bestE1 = est;
      });
    });
  });
  return {vol: bestVol, e1: bestE1};
}

/* Storage helper PR mostrati (per evitare di riemettere lo stesso PR al re-render) */
var _shownPRs = {};
function markPRShown(esNome){ _shownPRs[esNome] = Date.now(); }
function wasPRShownRecently(esNome){ return _shownPRs[esNome] && (Date.now() - _shownPRs[esNome]) < 3000; }

/* === B9: SYNC CONFLICT RESOLUTION === */
/* Ogni record (sessione, scheda) ha lastModified. Per merge: tieni quello più recente.
   I record cancellati diventano tombstone (deleted:true, deletedAt) per propagare la cancellazione
   tra dispositivi. Tombstone più vecchi di TOMBSTONE_TTL_DAYS vengono ripuliti. */

var TOMBSTONE_TTL_DAYS = 30;

function touchRecord(r){
  if(!r) return r;
  return Object.assign({}, r, {lastModified: Date.now()});
}

function touchAll(arr){ return (arr||[]).map(touchRecord); }

/* Soft-delete: marca come tombstone invece di rimuovere */
function softDelete(arr, id){
  return (arr||[]).map(function(r){
    if(r.id !== id) return r;
    return Object.assign({}, r, {deleted: true, deletedAt: Date.now(), lastModified: Date.now()});
  });
}

/* Filtra i tombstone per le query UI (Home, Log, Stats non li vedono) */
function liveRecords(arr){
  return (arr||[]).filter(function(r){ return !r.deleted; });
}

/* Pulisce tombstone vecchi (chiamato in save) */
function pruneTombstones(arr){
  var cutoff = Date.now() - TOMBSTONE_TTL_DAYS * 86400000;
  return (arr||[]).filter(function(r){
    return !(r.deleted && r.deletedAt && r.deletedAt < cutoff);
  });
}

/* Merge intelligente: per ogni id, tieni il record con lastModified più recente.
   Se uno dei due è tombstone, il tombstone "vince" se è più recente. */
function mergeRecords(local, remote){
  var byId = {};
  (local||[]).forEach(function(r){ if(r && r.id) byId[r.id] = r; });
  (remote||[]).forEach(function(r){
    if(!r || !r.id) return;
    var existing = byId[r.id];
    if(!existing){ byId[r.id] = r; return; }
    var lLM = existing.lastModified || 0;
    var rLM = r.lastModified || 0;
    // Se mancano timestamp da entrambe le parti, preferisci il locale (conservativo)
    if(rLM > lLM) byId[r.id] = r;
  });
  return Object.values(byId);
}

function mergeData(local, remote){
  return {
    schede: pruneTombstones(mergeRecords(local.schede||[], remote.schede||[])),
    sessions: pruneTombstones(mergeRecords(local.sessions||[], remote.sessions||[])),
    profile: pickNewer(local.profile, remote.profile)
  };
}
function pickNewer(a, b){
  if(!a) return b; if(!b) return a;
  var aLM = a.lastModified || 0, bLM = b.lastModified || 0;
  return bLM > aLM ? b : a;
}

'Leg press':{exec:'Piedi alti per enfatizzare i femorali, bassi per i quadricipiti. Non bloccare le ginocchia in estensione. Non lasciare che le anche si sollievino dal sedile in fondo — segnale che il peso è eccessivo.',prog:'Dropset fino al cedimento: riduci il peso senza pausa. Pausa 3s in fondo per più stimolo muscolare.',motto:'Le gambe forti sono la base di ogni tipo di atletismo.'},
'Affondi bulgari':{exec:'Piede posteriore sul banco, non troppo vicino. Scendi verticalmente: il ginocchio anteriore non deve proiettarsi oltre la punta del piede. Tronco eretto. Tutta la spinta dal tallone del piede anteriore.',prog:'Inizia a corpo libero, poi manubri ai fianchi, poi bilanciere. Correggono gli squilibri tra i lati meglio di qualsiasi altro esercizio per le gambe.',motto:'Un esercizio per gamba: nessuno si nasconde. Nessun lato si nasconde.'},
'Leg extension monolat':{exec:'Regola il sedile: l\'articolazione del ginocchio allineata con il fulcro della macchina — fondamentale per la salute del ginocchio. Estendi completamente ma senza scattare. Ritorno lento in 3s.',prog:'Monolaterale per correggere squilibri. Quando i due lati sono bilanciati, valuta il passaggio al bilaterale per più carico.',motto:'Quadricipiti forti proteggono il ginocchio. Rispetta sempre l\'articolazione.'},
'Leg curl':{exec:'Bacino schiacciato al supporto per isolare il femorale — evita di sollevare i glutei. Piega lentamente senza far scattare i talloni. Tieni la contrazione 1 secondo in cima prima di scendere.',prog:'Pausa 1s in cima, 3s in discesa. Prova una gamba alla volta per parità tra i lati. Femorali forti = ginocchia sane.',motto:'La prevenzione migliore contro gli infortuni al ginocchio si chiama femorale.'},
'Polpacci seduto':{exec:'Ginocchia a 90°: questo angolo attiva il soleo (la parte profonda del polpaccio). Range completo: tallone al massimo in basso, punta al massimo in alto. Nessun rimbalzo in fondo — il tendine d\'Achille ringrazia.',prog:'Alto volume, recuperi brevi: i polpacci rispondono alla fatica. Superserie seduto+piedi per colpire entrambi i fasci muscolari.',motto:'I polpacci rispondono al volume e alla costanza. Non alle scorciatoie.'},

/* ── auto-snapshot giornaliero (locale) ── */
var SNAP_PREFIX='gymtracker_snap_',SNAP_MAX_DAYS=7;
function todayISO(){return new Date().toISOString().split('T')[0];}
function makeDailySnapshot(data){
  try{
    var key=SNAP_PREFIX+todayISO();
    if(localStorage.getItem(key))return false;
    localStorage.setItem(key,JSON.stringify({date:todayISO(),createdAt:new Date().toISOString(),data:data}));
    cleanOldSnapshots();
    return true;
  }catch(e){return false;}
}
function cleanOldSnapshots(){
  try{
    var cutoff=new Date(Date.now()-SNAP_MAX_DAYS*86400000).toISOString().split('T')[0];
    var toDelete=[];
    for(var i=0;i<localStorage.length;i++){
      var k=localStorage.key(i);
      if(k&&k.indexOf(SNAP_PREFIX)===0){
        var d=k.replace(SNAP_PREFIX,'');
        if(d<cutoff)toDelete.push(k);
      }
    }
    toDelete.forEach(function(k){localStorage.removeItem(k);});
  }catch(e){}
}
function listSnapshots(){
  var arr=[];
  try{
    for(var i=0;i<localStorage.length;i++){
      var k=localStorage.key(i);
      if(k&&k.indexOf(SNAP_PREFIX)===0){
        var raw=localStorage.getItem(k);
        arr.push({key:k,date:k.replace(SNAP_PREFIX,''),size:Math.round((raw||'').length/1024*10)/10});
      }
    }
  }catch(e){}
  return arr.sort(function(a,b){return a.date<b.date?1:-1;});
}
function getSnapshotData(key){
  try{
    var raw=localStorage.getItem(key);if(!raw)return null;
    var snap=JSON.parse(raw);return snap.data||null;
  }catch(e){return null;}
}

var GID_KEY='gymtracker_gist_id', TOK_KEY='gymtracker_token';
function getToken(){try{return localStorage.getItem(TOK_KEY)||'';}catch(e){return '';}}
function saveToken(t){try{localStorage.setItem(TOK_KEY,t);}catch(e){}}
function getGistId(){try{return localStorage.getItem(GID_KEY)||'';}catch(e){return '';}}
function saveGistId(id){try{localStorage.setItem(GID_KEY,id);}catch(e){}}

async function findGist(token){
  var res=await fetch('https://api.github.com/gists?per_page=100',{headers:{'Authorization':'Bearer '+token}});
  var list=await res.json();
  return Array.isArray(list)?list.find(function(g){return g.description==='GymTracker Data'&&g.files&&g.files['gymtracker.json'];}):null;
}

async function loadFromGist(token){
  var gistId=getGistId();
  if(!gistId){
    var found=await findGist(token);
    if(!found)return null;
    saveGistId(found.id); gistId=found.id;
  }
  var res=await fetch('https://api.github.com/gists/'+gistId,{headers:{'Authorization':'Bearer '+token}});
  var data=await res.json();
  var raw=data.files&&data.files['gymtracker.json']&&data.files['gymtracker.json'].content;
  return raw?JSON.parse(raw):null;
}

async function syncToGist(data,token){
  var content=JSON.stringify(data);
  var gistId=getGistId();
  if(!gistId){
    var found=await findGist(token);
    if(found){gistId=found.id;saveGistId(gistId);}
    else{
      var res=await fetch('https://api.github.com/gists',{method:'POST',headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify({description:'GymTracker Data',public:false,files:{'gymtracker.json':{content:content}}})});
      var gist=await res.json();
      if(gist.id){saveGistId(gist.id);}
      return;
    }
  }
  await fetch('https://api.github.com/gists/'+gistId,{method:'PATCH',headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify({files:{'gymtracker.json':{content:content}}})});
}

/* mapping local shape ↔ DB rows */
function profileLocalToRow(p, userId){
  if(!p) return null;
  return {
    id: userId,
    nome: p.nome || null,
    data_nascita: p.dataNascita || null,
    peso: (p.peso === '' || p.peso == null) ? null : Number(p.peso),
    altezza: (p.altezza === '' || p.altezza == null) ? null : Number(p.altezza),
    obiettivo: p.obiettivo || null,
    livello: p.livello || null,
    theme: (function(){ try{ return loadTheme().id; }catch(e){ return 'lime'; } })(),
    freq: (function(){ try{ return getFreq(); }catch(e){ return {}; } })(),
    last_modified: p.lastModified || Date.now(),
    updated_at: new Date().toISOString()
  };
}
function profileRowToLocal(row){
  if(!row) return null;
  return {
    nome: row.nome || '',
    dataNascita: row.data_nascita || '',
    peso: row.peso != null ? String(row.peso) : '',
    altezza: row.altezza != null ? String(row.altezza) : '',
    obiettivo: row.obiettivo || 'Ipertrofia',
    livello: row.livello || 'Intermedio',
    lastModified: row.last_modified || 0
  };
}
function schedaLocalToRow(s, userId){
  return {
    id: s.id,
    user_id: userId,
    name: s.nome || s.name || null,
    data: s,
    last_modified: s.lastModified || Date.now(),
    deleted: !!s.deleted,
    deleted_at: s.deletedAt || null,
    updated_at: new Date().toISOString()
  };
}
function sessionLocalToRow(s, userId){
  return {
    id: s.id,
    user_id: userId,
    scheda_id: s.sId || null,
    block_id: s.bId || null,
    type: s.tipo === 'cal' ? 'cal' : 'pesi',
    started_at: s.t0 || null,
    duration_sec: s.dur || null,
    mood: typeof s.umore === 'number' ? s.umore : null,
    note: s.nota || null,

    deleted: !!s.deleted,
    deleted_at: s.deletedAt || null,

async function sbLoadAll(){
  if(!sb) return null;
  var user = await sbGetUser();
  if(!user) return null;
  var results = await Promise.all([
    sb.from('profiles').select('*').eq('id', user.id).maybeSingle(),
    sb.from('schede').select('data').eq('user_id', user.id),
    sb.from('sessions').select('data').eq('user_id', user.id)
  ]);
  var profileRes = results[0], schedeRes = results[1], sessionsRes = results[2];
  if(profileRes.error) console.warn('sb profile load', profileRes.error);
  if(schedeRes.error) console.warn('sb schede load', schedeRes.error);
  if(sessionsRes.error) console.warn('sb sessions load', sessionsRes.error);
  return {
    profileRow: profileRes.data || null,
    schede: (schedeRes.data || []).map(function(r){ return r.data; }).filter(Boolean),
    sessions: (sessionsRes.data || []).map(function(r){ return r.data; }).filter(Boolean)
  };
}

async function sbPushProfile(profile){
  if(!sb || !profile) return;
  var user = await sbGetUser();
  if(!user) return;
  var row = profileLocalToRow(profile, user.id);
  var r = await sb.from('profiles').upsert(row, { onConflict: 'id' });
  if(r.error) throw r.error;
}
async function sbPushSchede(schede){
  if(!sb || !schede || !schede.length) return;
  var user = await sbGetUser();
  if(!user) return;
  var rows = schede.map(function(s){ return schedaLocalToRow(s, user.id); });
  for(var i=0;i<rows.length;i+=80){
    var chunk = rows.slice(i, i+80);
    var r = await sb.from('schede').upsert(chunk, { onConflict: 'user_id,id' });
    if(r.error) throw r.error;
  }
}
async function sbPushSessions(sessions){
  if(!sb || !sessions || !sessions.length) return;
  var user = await sbGetUser();
  if(!user) return;
  var rows = sessions.map(function(s){ return sessionLocalToRow(s, user.id); });
  for(var i=0;i<rows.length;i+=80){
    var chunk = rows.slice(i, i+80);
    var r = await sb.from('sessions').upsert(chunk, { onConflict: 'user_id,id' });
    if(r.error) throw r.error;
  }
}
async function sbPushAll(data){
  if(!sb) return;
  await Promise.all([
    data.profile ? sbPushProfile(data.profile) : Promise.resolve(),
    sbPushSchede(data.schede || []),
    sbPushSessions(data.sessions || [])
  ]);
}

/* Migrazione one-shot da localStorage/Gist al cloud */
async function sbMigrateIfNeeded(localData){
  try{
    if(localStorage.getItem(MIGRATED_KEY)) return false;
    if(!sb) return false;
    var hasAnything = (localData.schede && localData.schede.length) ||
                      (localData.sessions && localData.sessions.length) ||
                      (localData.profile && localData.profile.nome);
    if(hasAnything){ await sbPushAll(localData); }
    try{ localStorage.setItem(MIGRATED_KEY, new Date().toISOString()); }catch(e){}
    return hasAnything;
  }catch(e){
    console.warn('Migration failed (retry next session):', e);
    return false;
  }
}

function fmtRec(s){if(!s||s===0)return '–';var m=Math.floor(s/60);var sc=s%60;if(m===0)return sc+'s';if(sc===0)return m+'min';return m+'\''+String(sc).padStart(2,'0')+'"';}

function estimateTime(bl){var m=10;bl.es.forEach(function(ex){if(ex.tipo==='riscaldamento'){m+=(ex.durata||10)+1;}else{var s=typeof ex.serie==='number'?ex.serie:(ex.sets||3);var r=ex.rec||ex.recSet||90;m+=s*(0.75+r/60)+1;}});return Math.ceil(m/5)*5;}

function makeSetSerie(setEs){
  return function(idx,si,field,val){
    setEs(function(prev){
      return prev.map(function(ex,i){
        if(i!==idx)return ex;
        var newSerie=ex.serie.map(function(s,j){
          if(j!==si)return s;
          var u=Object.assign({},s);u[field]=parseFloat(val)||0;return u;
        });
        return Object.assign({},ex,{serie:newSerie});
      });
    });
  };
}
function makeAddSerie(setEs){
  return function(idx){
    setEs(function(prev){
      return prev.map(function(ex,i){
        if(i!==idx)return ex;
        var last=ex.serie[ex.serie.length-1];
        var ns={n:ex.serie.length+1,peso:last?last.peso:0,reps:last?last.reps:10,ok:false,t:null};
        return Object.assign({},ex,{serie:ex.serie.concat([ns])});
      });
    });
  };
}

function Chart(p){

  /* Cancella sessione con undo (B10) + soft-delete (B9) */
  function deleteSessionWithUndo(id){
    var deleted = sessions.find(function(x){ return x.id===id && !x.deleted; });
    if(!deleted) return;
    /* Soft-delete: marca come tombstone invece di rimuovere */
    setSessions(function(prev){ return softDelete(prev, id); });
    setUndoData({type:'session', item:deleted, msg:'Sessione eliminata', t:Date.now()});
    hap(20);
  }
  function applyUndo(){
    if(!undoData) return;
    if(undoData.type === 'session'){
      var item = undoData.item;
      /* Ripristina rimuovendo il tombstone (riprende il record originale) */
      setSessions(function(prev){
        return prev.map(function(r){
          if(r.id !== item.id) return r;
          var restored = Object.assign({}, r);
          delete restored.deleted; delete restored.deletedAt;
          restored.lastModified = Date.now();
          return restored;
        });
      });
    } else if(undoData.type === 'scheda'){
      var sc = undoData.item;
      setSchede(function(prev){
        return prev.map(function(r){
          if(r.id !== sc.id) return r;
          var restored = Object.assign({}, r);
          delete restored.deleted; delete restored.deletedAt;
          restored.lastModified = Date.now();
          return restored;
        });
      });
    }
    setUndoData(null);
    hap(15);
  }

  /* Sync verso il cloud: Supabase se loggato, altrimenti Gist (legacy) come fallback */
  function pushSync(){
    if(sb && user){
      setSyncStatus('syncing');
      sbPushAll({schede:schede, sessions:sessions, profile:profile})
        .then(function(){setSyncStatus('ok');setTimeout(function(){setSyncStatus('idle');},2000);})
        .catch(function(err){console.warn('sb push',err);setSyncStatus('error');setTimeout(function(){setSyncStatus('idle');},3000);});
      return;
    }
    /* Legacy Gist sync (per compatibilità con utenti pre-Supabase) */
    var tok=getToken();if(!tok)return;
    setSyncStatus('syncing');
    syncToGist({schede:schede,sessions:sessions,profile:profile},tok)
      .then(function(){setSyncStatus('ok');setTimeout(function(){setSyncStatus('idle');},2000);})
      .catch(function(){setSyncStatus('error');setTimeout(function(){setSyncStatus('idle');},3000);});
  }

  /* Caricamento iniziale dal cloud: parte dopo il login + esegue migrazione automatica */
  useEffect(function(){
    if(!sb || !user || cloudLoaded) return;
    var cancelled = false;
    setSyncStatus('loading');
    (async function(){
      try{
        /* Step 1: migrazione una-tantum dei dati localStorage → cloud */
        var localSnapshot = {schede: schede, sessions: sessions, profile: profile};
        await sbMigrateIfNeeded(localSnapshot);

        /* Step 2: scarica tutto dal cloud */
        var remote = await sbLoadAll();
        if(cancelled || !remote) return;

        /* Step 3: merge intelligente con quello locale (vince lastModified più recente)
           Nota: il trigger DB crea una riga `profiles` vuota al signup (solo id, niente nome).
           Quella riga NON va trattata come profilo valido: altrimenti l'app salterebbe il
           ProfileSetup mostrandolo per un istante e chiudendolo da solo. */
        var hasRealProfile = remote.profileRow && remote.profileRow.nome && remote.profileRow.nome.trim().length > 0;
        var remoteProfile = hasRealProfile ? profileRowToLocal(remote.profileRow) : null;
        var local = {schede: schede, sessions: sessions, profile: profile};
        var merged = mergeData(local, {schede: remote.schede, sessions: remote.sessions, profile: remoteProfile});

        if(merged.schede && (merged.schede.length !== schede.length || JSON.stringify(merged.schede) !== JSON.stringify(schede))){
          setSchede(merged.schede);
        }
        if(merged.sessions && (merged.sessions.length !== sessions.length || JSON.stringify(merged.sessions) !== JSON.stringify(sessions))){
          setSessions(merged.sessions);
        }
        if(merged.profile && JSON.stringify(merged.profile) !== JSON.stringify(profile)){
          setProfile(merged.profile);
        }
        setCloudLoaded(true);
        setSyncStatus('ok');setTimeout(function(){if(!cancelled)setSyncStatus('idle');},2000);
      }catch(e){
        console.warn('cloud load failed', e);
        setSyncStatus('error');setTimeout(function(){if(!cancelled)setSyncStatus('idle');},3000);
      }
    })();
    return function(){ cancelled = true; };
  },[user, cloudLoaded]);

  /* Fallback legacy Gist: solo se NON loggato in Supabase (utenti pre-migrazione) */
  useEffect(function(){
    if(sb && user) return; // skip Gist se autenticato cloud
    var tok=getToken();
    if(!tok)return;
    setSyncStatus('loading');
    loadFromGist(tok).then(function(remote){
      if(remote){
        var local = {schede: schede, sessions: sessions, profile: profile};
        var merged = mergeData(local, remote);
        if(merged.schede && (merged.schede.length !== schede.length || JSON.stringify(merged.schede) !== JSON.stringify(schede))){
          setSchede(merged.schede);
        }
        if(merged.sessions && (merged.sessions.length !== sessions.length || JSON.stringify(merged.sessions) !== JSON.stringify(sessions))){
          setSessions(merged.sessions);
        }
        if(merged.profile && JSON.stringify(merged.profile) !== JSON.stringify(profile)){
          setProfile(merged.profile);
        }
      }
      setSyncStatus('ok');setTimeout(function(){setSyncStatus('idle');},2000);
    }).catch(function(){setSyncStatus('error');setTimeout(function(){setSyncStatus('idle');},3000);});
  },[user]);

  useEffect(function(){stSave({schede:schede,sessions:sessions});makeDailySnapshot({schede:schede,sessions:sessions,profile:profile});},[schede,sessions,profile]);
  var syncTimer=useRef(null);
  useEffect(function(){
    /* Aspetta che il cloud abbia caricato prima di iniziare a pushare,
       altrimenti il primo merge si sovrascrive col locale */
    if(sb && user && !cloudLoaded) return;
    if(syncTimer.current)clearTimeout(syncTimer.current);
    syncTimer.current=setTimeout(pushSync,1800);
    return function(){if(syncTimer.current)clearTimeout(syncTimer.current);};
  },[schede,sessions,profile,user,cloudLoaded]);

  /* Sessions/schede live (filtro tombstone per le viste) */
  var liveSessions = liveRecords(sessions);
  var liveSchede = liveRecords(schede);

  /* Auth gate: aspetta che Supabase abbia caricato la sessione, poi mostra LoginScreen se non loggato */
  if(sb && !authReady){
    return h('div',{style:{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center'}},
      h('div',{style:{color:MUTED,fontSize:13}},'Caricamento…')
    );
  }
  if(sb && !user){
    return h(LoginScreen,null);
  }

  if(!profile)return h(ProfileSetup,{onDone:function(p){
    setProfile(p);
    /* Se loggato, pusha subito il profilo al cloud così la profile row creata dal trigger viene popolata */
    if(sb && user){ sbPushProfile(p).catch(function(e){console.warn('profile push',e);}); }
  }, onApplyTemplate:function(templateId){
    var sch = window.applyTemplate(templateId);
    if(sch && sch.length){ setSchede(touchAll(sch)); }
  }});

  var isLive=view==='live'||view==='callive';
  return h('div',{style:{maxWidth:440,margin:'0 auto',paddingBottom:isLive?0:80,position:'relative'}},
    view==='home'&&h(Home,{schede:liveSchede,sessions:liveSessions,profile:profile,go:go,syncStatus:syncStatus}),
    view==='settings'&&h(Settings,{profile:profile,onProfile:setProfile,go:go,schede:liveSchede,sessions:liveSessions,setSchede:function(s){setSchede(touchAll(s));},setSessions:function(s){setSessions(touchAll(s));}}),
    view==='start'&&h(Start,{schede:liveSchede,go:go}),
    view==='pesiblocks'&&h(PesiBlocks,{schede:liveSchede,sessions:liveSessions,go:go}),
    view==='live'&&h(PesiLive,{bl:args.bl,sId:args.sId,go:go,allSessions:liveSessions,onSave:function(s){setSessions(function(p){return p.concat([touchRecord(s)]);});}}),
    view==='callive'&&h(CalLive,{go:go,allSessions:liveSessions,onSave:function(s){setSessions(function(p){return p.concat([touchRecord(s)]);});}}),
    view==='log'&&h(Log,{sessions:liveSessions,schede:liveSchede,go:go}),
    view==='det'&&h(Det,{s:args.s,schede:liveSchede,go:go,onDelete:function(id){deleteSessionWithUndo(id);go('log');}}),
    view==='stats'&&h(Stats,{sessions:liveSessions,go:go}),
    view==='scheda'&&h(SchedaV,{schede:liveSchede,setSchede:function(updater){
      setSchede(function(prev){
        var next = typeof updater === 'function' ? updater(prev) : updater;
        return next.map(function(s){
          // Tocca solo i record non-tombstone modificati di recente
          var was = prev.find(function(p){ return p.id === s.id; });
          if(!was || JSON.stringify(was) !== JSON.stringify(s)){
            return Object.assign({}, s, {lastModified: Date.now()});
          }
          return s;
        });
      });
    },go:go,setUndoData:setUndoData}),
    view==='nuova'&&h(NuovaScheda,{go:go,existing:args.edit,setSchede:function(updater){
      setSchede(function(prev){
        var next = typeof updater === 'function' ? updater(prev) : updater;
        return next.map(function(s){
          var was = prev.find(function(p){ return p.id === s.id; });
          if(!was || JSON.stringify(was) !== JSON.stringify(s)){
            return Object.assign({}, s, {lastModified: Date.now()});
          }
          return s;
        });
      });
    }}),
    !isLive&&h(Nav,{cur:view,go:go}),
    /* PR Burst overlay (C12) */
    prBurst && h('div', {className:'pr-burst'},
      h('div', {style:{fontSize:14, fontFamily:"'Barlow Condensed',sans-serif", letterSpacing:'0.1em', opacity:0.85}}, '🏆 ' + prBurst.msg),
      h('div', {style:{fontSize:32, fontFamily:"'Bebas Neue',cursive", marginTop:4}}, prBurst.nome)
    ),
    /* Undo Toast (B10) */
    undoData && h('div', {className:'toast', style:{
      position:'fixed', bottom: isLive?20:96, left:'50%', transform:'translateX(-50%)',
      background:'var(--surf-3)', border:'1px solid var(--bord-2)', borderRadius:12,
      padding:'12px 16px', display:'flex', gap:14, alignItems:'center',
      zIndex:300, maxWidth: 'calc(100% - 32px)',
      boxShadow:'0 8px 24px rgba(0,0,0,0.4)'
    }},
      h('span', {style:{fontSize:13, color:'var(--text)'}}, undoData.msg),
      h('button', {
        onClick: applyUndo,
        style:{background:'transparent', border:'none', color:'var(--acc)', fontWeight:700, cursor:'pointer', fontFamily:"'Barlow Condensed',sans-serif", letterSpacing:'0.06em', fontSize:13}
      }, 'ANNULLA')
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(ErrorBoundary,null,h(App,null)));
</script>
<script>
/* Splash hide + Service Worker registration */
window.addEventListener('load', function(){
  // Hide splash screen once React has mounted
  setTimeout(function(){
    var s = document.getElementById('splash');
    if (s) { s.classList.add('hide'); setTimeout(function(){ if (s.parentNode) s.parentNode.removeChild(s); }, 350); }
  }, 450);

  // Register service worker (only over HTTPS or on localhost)
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js')
      .then(function(reg){
        // Mostra banner quando una nuova versione è pronta
        function showUpdateBanner(newWorker){
          if(document.getElementById('gt-update-banner')) return;
          var bar = document.createElement('div');
          bar.id = 'gt-update-banner';
          bar.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--acc);color:var(--act);padding:12px 18px;border-radius:12px;display:flex;gap:14px;align-items:center;z-index:10000;box-shadow:0 8px 24px rgba(0,0,0,0.5);font-family:Barlow,sans-serif;font-size:13px;font-weight:600;max-width:calc(100% - 32px)';
          bar.innerHTML = '<span>Nuova versione disponibile</span>';
          var btn = document.createElement('button');
          btn.textContent = 'Aggiorna';
          btn.style.cssText = 'background:var(--act);color:var(--acc);border:none;padding:7px 14px;border-radius:8px;font-weight:700;cursor:pointer;font-size:12px;letter-spacing:0.04em;text-transform:uppercase';
          btn.onclick = function(){
            if(newWorker) newWorker.postMessage({type:'SKIP_WAITING'});
            window.location.reload();
          };
          bar.appendChild(btn);
          document.body.appendChild(bar);
        }
        // Se c'è già un SW in attesa al boot, mostra subito
        if (reg.waiting && navigator.serviceWorker.controller) {
          showUpdateBanner(reg.waiting);
        }
        reg.addEventListener('updatefound', function(){
          var n = reg.installing;
          if (!n) return;
          n.addEventListener('statechange', function(){
            if (n.state === 'installed' && navigator.serviceWorker.controller) {
              showUpdateBanner(n);
            }
          });
        });
        // Reload automatico quando il nuovo SW prende il controllo
        var refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', function(){
          if(refreshing) return;
          refreshing = true;
          window.location.reload();
        });
        // Controlla aggiornamenti periodicamente (ogni 60s quando l'app è aperta)
        setInterval(function(){ try{ reg.update(); }catch(e){} }, 60000);
      })
      .catch(function(err){ console.warn('SW registration failed:', err); });
  }
});
</script>
